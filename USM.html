<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Подключаем трекер сессий -->
<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ПЕРЕМЕННЫЕ
     ============================================================ */
  :root {
    --orange-1: #FF6A00;
    --orange-2: #E85D00;
    --orange-3: #FF8C42;
    --orange-4: #FFB380;
    --orange-glow: rgba(255, 106, 0, 0.3);
    --glass-bg: rgba(255, 255, 255, 0.15);
    --glass-border: rgba(255, 255, 255, 0.25);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    --dark-bg: #0f0f1a;
    --card-bg: rgba(255, 255, 255, 0.08);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.7);
    --text-muted: rgba(255, 255, 255, 0.4);
  }

  /* ============================================================
     ГЛОБАЛЬНЫЕ СТИЛИ
     ============================================================ */
  * {
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--dark-bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* Анимированный фон */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255, 106, 0, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 106, 0, 0.08) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 106, 0, 0.05) 0%, transparent 30%),
      var(--dark-bg);
    z-index: -2;
  }

  /* Плавающие частицы */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, rgba(255, 106, 0, 0.3), transparent),
      radial-gradient(2px 2px at 40px 70px, rgba(255, 106, 0, 0.2), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255, 106, 0, 0.4), transparent),
      radial-gradient(2px 2px at 90px 40px, rgba(255, 106, 0, 0.2), transparent),
      radial-gradient(2px 2px at 130px 80px, rgba(255, 106, 0, 0.3), transparent),
      radial-gradient(2px 2px at 160px 30px, rgba(255, 106, 0, 0.2), transparent);
    background-size: 200px 200px;
    background-repeat: repeat;
    opacity: 0.5;
    z-index: -1;
    animation: floatParticles 20s linear infinite;
  }

  @keyframes floatParticles {
    0% { transform: translateY(0); }
    100% { transform: translateY(-200px); }
  }

  /* ============================================================
     ОСНОВНАЯ ОБЕРТКА
     ============================================================ */
  .page-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* ============================================================
     СТЕКЛЯННАЯ КАРТОЧКА
     ============================================================ */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: var(--glass-shadow);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glass-card:hover {
    box-shadow: 0 8px 40px rgba(255, 106, 0, 0.15);
    border-color: rgba(255, 106, 0, 0.4);
  }

  /* ============================================================
     ШАПКА
     ============================================================ */
  .header {
    background: linear-gradient(135deg, rgba(255, 106, 0, 0.3), rgba(232, 93, 0, 0.1));
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255, 106, 0, 0.2), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .header-icon {
    font-size: 2.6rem;
    line-height: 1;
    flex-shrink: 0;
    filter: drop-shadow(0 0 20px rgba(255, 106, 0, 0.3));
    animation: pulseIcon 2s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  @keyframes pulseIcon {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 106, 0, 0.3)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(255, 106, 0, 0.5)); }
  }

  .header h1 {
    margin: 0;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 700;
    font-family: 'Unbounded', sans-serif;
    flex: 1;
    min-width: 120px;
    background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.7));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .btn-glass {
    padding: 10px 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    font-weight: 600;
    font-size: clamp(12px, 2.5vw, 14px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
  }

  .btn-glass:hover {
    background: rgba(255, 106, 0, 0.3);
    border-color: var(--orange-1);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255, 106, 0, 0.2);
  }

  .btn-glass:active {
    transform: scale(0.97);
  }

  .btn-glass-primary {
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(255, 106, 0, 0.3);
  }

  .btn-glass-primary:hover {
    background: linear-gradient(135deg, var(--orange-2), var(--orange-1));
    box-shadow: 0 8px 35px rgba(255, 106, 0, 0.4);
    border-color: transparent;
  }

  .btn-glass-primary.hidden {
    display: none;
  }

  /* ============================================================
     ПОИСК
     ============================================================ */
  .search-wrap {
    margin-bottom: 20px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: clamp(14px, 3vw, 16px);
    font-family: 'Inter', sans-serif;
    color: white;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-appearance: none;
    appearance: none;
  }

  .search-wrap input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--orange-1);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 30px rgba(255, 106, 0, 0.1);
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 24px 28px;
  }

  /* ============================================================
     СТАТЬИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 16px;
  }

  .article-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    padding: 20px 24px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .article-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 106, 0, 0.05), transparent 50%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .article-card:hover {
    border-color: rgba(255, 106, 0, 0.3);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .article-card:hover::before {
    opacity: 1;
  }

  .article-card:active {
    transform: scale(0.98);
  }

  .article-card-header {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .article-card h3 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    font-weight: 600;
    margin: 0;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    word-break: break-word;
  }

  .article-card .article-description {
    color: var(--text-secondary);
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    margin: 4px 0 10px;
    line-height: 1.6;
    word-break: break-word;
    position: relative;
    z-index: 1;
  }

  .article-card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: clamp(0.7rem, 2vw, 0.8rem);
    color: var(--text-muted);
    position: relative;
    z-index: 1;
  }

  .article-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Админ-кнопки */
  .admin-actions-on-card {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    position: relative;
    z-index: 2;
  }

  .btn-icon {
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    color: var(--text-secondary);
    font-size: clamp(11px, 2vw, 12px);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .btn-icon:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
  }

  .btn-icon:active {
    transform: scale(0.95);
  }

  .btn-icon-edit:hover {
    border-color: var(--orange-1);
    color: var(--orange-1);
    box-shadow: 0 0 20px rgba(255, 106, 0, 0.1);
  }

  .btn-icon-delete:hover {
    border-color: #ef4444;
    color: #ef4444;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
  }

  .btn-icon.hidden {
    display: none;
  }

  /* Кнопка "Читать полностью" */
  .btn-toggle-content {
    background: none;
    border: none;
    color: var(--orange-1);
    font-weight: 600;
    cursor: pointer;
    font-size: clamp(0.8rem, 2vw, 0.85rem);
    padding: 10px 4px;
    width: 100%;
    text-align: left;
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
    font-family: 'Inter', sans-serif;
  }

  .btn-toggle-content:hover {
    color: var(--orange-3);
    letter-spacing: 0.5px;
  }

  .btn-toggle-content:active {
    transform: scale(0.98);
  }

  /* ============================================================
     СОДЕРЖИМОЕ СТАТЬИ (СОВРЕМЕННЫЙ СТИЛЬ)
     ============================================================ */
  .article-content {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: none;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    line-height: 1.7;
    color: var(--text-secondary);
    word-wrap: break-word;
    overflow-wrap: break-word;
    position: relative;
    z-index: 1;
  }

  .article-content.expanded {
    display: block;
    animation: fadeSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeSlideIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .article-content .two-columns {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 14px 0;
  }

  .article-content .two-columns > div {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 16px 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    min-width: 0;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .article-content .two-columns > div:hover {
    border-color: rgba(255, 106, 0, 0.2);
    background: rgba(255, 255, 255, 0.06);
  }

  .article-content .panel-title {
    font-weight: 700;
    font-size: clamp(0.9rem, 2.8vw, 1rem);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .article-content .step-list {
    list-style: none;
    padding: 0;
    margin: 0 0 10px 0;
  }

  .article-content .step-list li {
    margin-bottom: 10px;
    padding-left: 24px;
    position: relative;
    line-height: 1.6;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
    word-break: break-word;
    color: var(--text-secondary);
  }

  .article-content .step-list li::before {
    content: "✦";
    color: var(--orange-1);
    position: absolute;
    left: 0;
    font-size: clamp(12px, 2.5vw, 14px);
    top: 1px;
  }

  .article-content .script {
    background: rgba(255, 106, 0, 0.08);
    border-left: 3px solid var(--orange-1);
    padding: 12px 16px;
    margin: 10px 0;
    border-radius: 12px;
    font-weight: 500;
    color: var(--text-primary);
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    word-break: break-word;
    backdrop-filter: blur(10px);
  }

  .article-content .important-note {
    background: rgba(255, 106, 0, 0.05);
    padding: 12px 16px;
    border-radius: 12px;
    margin-top: 10px;
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    border: 1px solid rgba(255, 106, 0, 0.1);
    word-break: break-word;
    backdrop-filter: blur(10px);
  }

  .article-content .forbidden {
    background: rgba(239, 68, 68, 0.06);
    border-left: 3px solid #ef4444;
    padding: 12px 16px;
    border-radius: 12px;
    margin-top: 10px;
    word-break: break-word;
  }

  .article-content .forbidden p {
    font-weight: 700;
    color: #ef4444;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
  }

  .article-content .forbidden span {
    font-size: clamp(0.78rem, 2.2vw, 0.88rem);
    color: var(--text-secondary);
  }

  .article-content .kpi-badge {
    background: linear-gradient(135deg, rgba(255, 106, 0, 0.2), rgba(255, 106, 0, 0.05));
    color: var(--orange-1);
    border-radius: 30px;
    padding: 4px 14px;
    font-size: clamp(0.6rem, 1.8vw, 0.7rem);
    font-weight: 600;
    display: inline-block;
    margin-bottom: 8px;
    border: 1px solid rgba(255, 106, 0, 0.1);
    letter-spacing: 0.5px;
  }

  .article-content .table-mini {
    margin-top: 10px;
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(0.72rem, 2vw, 0.82rem);
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .article-content .table-mini td,
  .article-content .table-mini th {
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding: 10px 8px;
    vertical-align: top;
    text-align: left;
    word-break: break-word;
    min-width: 50px;
    color: var(--text-secondary);
  }

  .article-content .table-mini th {
    font-weight: 700;
    color: var(--orange-1);
    min-width: 60px;
    font-size: clamp(0.7rem, 1.8vw, 0.78rem);
  }

  .article-content .table-mini tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  .article-content .flex-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 12px 0;
  }

  .article-content .flex-card {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 16px 18px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.3s ease;
    min-width: 0;
  }

  .article-content .flex-card:hover {
    border-color: rgba(255, 106, 0, 0.15);
    background: rgba(255, 255, 255, 0.06);
  }

  .article-content .flex-card .card-title {
    font-weight: 700;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    margin-bottom: 6px;
    color: var(--orange-1);
  }

  .article-content .flex-card p {
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
    line-height: 1.6;
    margin: 0;
    color: var(--text-secondary);
    word-break: break-word;
  }

  .article-content .footer-note {
    margin-top: 16px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(255, 106, 0, 0.08), rgba(255, 106, 0, 0.02));
    border-radius: 16px;
    border: 1px solid rgba(255, 106, 0, 0.08);
    text-align: center;
  }

  .article-content .footer-note .footer-text {
    font-weight: 700;
    font-size: clamp(0.9rem, 2.8vw, 1.1rem);
    background: linear-gradient(135deg, var(--orange-1), var(--orange-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
    filter: grayscale(0.5);
  }

  .empty-state p {
    margin: 4px 0;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
  }

  /* ============================================================
     МОДАЛКИ (СТЕКЛЯННЫЕ)
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    animation: fadeIn 0.3s ease;
  }

  .modal-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 700px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .modal-content h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    margin: 0 0 4px;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-content .sub {
    color: var(--text-secondary);
    margin: 0 0 16px;
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
  }

  .modal-content .field {
    margin-bottom: 14px;
  }

  .modal-content .field label {
    display: block;
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .modal-content .field input,
  .modal-content .field textarea,
  .modal-content .field select {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    font-size: clamp(14px, 3vw, 16px);
    font-family: 'Inter', sans-serif;
    color: white;
    transition: all 0.3s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .modal-content .field input::placeholder,
  .modal-content .field textarea::placeholder {
    color: rgba(255, 255, 255, 0.3);
  }

  .modal-content .field textarea {
    min-height: 120px;
    resize: vertical;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(12px, 2.5vw, 13px);
    line-height: 1.6;
  }

  .modal-content .field input:focus,
  .modal-content .field textarea:focus,
  .modal-content .field select:focus {
    outline: none;
    border-color: var(--orange-1);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 30px rgba(255, 106, 0, 0.05);
  }

  .modal-content .field select option {
    background: #1a1a2e;
    color: white;
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(14px, 3vw, 16px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
  }

  .modal-actions .btn-primary {
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    color: #fff;
    box-shadow: 0 4px 20px rgba(255, 106, 0, 0.3);
  }

  .modal-actions .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255, 106, 0, 0.4);
  }

  .modal-actions .btn-primary:active {
    transform: scale(0.97);
  }

  .modal-actions .btn-cancel {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-secondary);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .modal-actions .btn-cancel:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .modal-actions .btn-cancel:active {
    transform: scale(0.97);
  }

  .modal-actions .btn-danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
  }

  .modal-actions .btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
  }

  .modal-actions .btn-danger:active {
    transform: scale(0.97);
  }

  .formatting-hint {
    font-size: clamp(11px, 2vw, 12px);
    color: var(--text-muted);
    margin-top: 4px;
    background: rgba(255, 255, 255, 0.03);
    padding: 8px 12px;
    border-radius: 8px;
    word-break: break-word;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .formatting-hint code {
    background: rgba(255, 255, 255, 0.06);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: clamp(10px, 1.8vw, 11px);
    display: inline-block;
    margin: 2px 2px;
    color: var(--orange-1);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ============================================================
     АДАПТИВНОСТЬ
     ============================================================ */
  @media (min-width: 768px) {
    .page-wrap {
      padding: 30px;
    }

    .content {
      padding: 28px 32px;
    }

    .header {
      padding: 24px 32px;
    }

    .header-actions {
      width: auto;
    }

    .article-card-header {
      flex-direction: row;
      align-items: flex-start;
    }

    .admin-actions-on-card {
      flex: none;
    }

    .article-content .two-columns {
      flex-direction: row;
    }

    .article-content .flex-cards {
      flex-direction: row;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-content {
      padding: 32px;
    }
  }

  @media (min-width: 1024px) {
    .page-wrap {
      padding: 40px 30px;
    }

    .articles-grid {
      gap: 20px;
    }

    .article-card {
      padding: 24px 28px;
    }

    .article-content .two-columns {
      gap: 20px;
    }

    .article-content .two-columns > div {
      padding: 20px 24px;
    }
  }

  @media (max-width: 360px) {
    .header-icon {
      font-size: 2rem;
    }
    .header {
      padding: 14px 16px;
    }
    .article-card {
      padding: 14px 16px;
    }
    .modal-content {
      padding: 16px;
    }
  }

  /* ============================================================
     БЕЗОПАСНАЯ ЗОНА ДЛЯ iPhone
     ============================================================ */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 768px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(30px, env(safe-area-inset-left));
        padding-right: max(30px, env(safe-area-inset-right));
        padding-top: max(30px, env(safe-area-inset-top));
        padding-bottom: max(30px, env(safe-area-inset-bottom));
      }
    }
  }

  /* ============================================================
     UPDATED: НОВЫЕ КЛАССЫ ДЛЯ СТАТЕЙ (ОБНОВЛЕННЫЕ)
     ============================================================ */
  .article-content .step-list li strong,
  .article-content .step-list li b {
    color: var(--text-primary);
    font-weight: 600;
  }

  .article-content .step-list li i {
    color: var(--orange-3);
    font-style: italic;
  }

  .article-content .highlight-orange {
    color: var(--orange-1);
    font-weight: 600;
  }

  .article-content .two-columns .panel-title i {
    color: var(--text-secondary);
    font-style: normal;
  }

  .article-content .script i {
    color: var(--orange-3);
    font-style: italic;
  }

  .article-content .important-note strong {
    color: var(--orange-1);
  }

  .article-content .forbidden span b {
    color: #ef4444;
  }

  /* Стили для цитат */
  .article-content .quote-block {
    background: rgba(255, 106, 0, 0.05);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 10px 0;
    border-left: 3px solid var(--orange-1);
    font-style: italic;
    color: var(--text-secondary);
  }

  .article-content .quote-block strong {
    color: var(--text-primary);
    font-style: normal;
  }

  /* Анимированный счетчик */
  .article-content .step-list li {
    counter-increment: step-counter;
  }

  /* ============================================================
     КАСТОМНЫЙ СКРОЛЛ
     ============================================================ */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255, 106, 0, 0.3);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 106, 0, 0.5);
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="glass-card">
    <!-- Шапка -->
    <div class="header">
      <div class="header-icon">📚</div>
      <h1>Материалы для УСМ</h1>
      <div class="header-actions">
        <a href="index.html" class="btn-glass">← Назад</a>
        <button class="btn-glass btn-glass-primary hidden" id="addArticleBtn">➕ Добавить</button>
      </div>
    </div>

    <div class="content">
      <!-- Поиск -->
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
      </div>

      <!-- Список статей -->
      <div id="articlesContainer" class="articles-grid">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>

    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">

      <div class="field">
        <label for="editArticleTitle">Название статьи *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>

      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>

      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст статьи с HTML-форматированием..."></textarea>
        <div class="formatting-hint">
          💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code>
        </div>
      </div>

      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА УДАЛЕНИЯ
     ============================================================ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-content">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color: var(--orange-1); word-break:break-word;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-cancel" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

// DOM элементы
const articlesContainer = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addArticleBtn = document.getElementById('addArticleBtn');

// Модалка редактирования
const editModal = document.getElementById('editModal');
const editModalTitle = document.getElementById('editModalTitle');
const editArticleForm = document.getElementById('editArticleForm');
const editArticleId = document.getElementById('editArticleId');
const editArticleTitle = document.getElementById('editArticleTitle');
const editArticleDescription = document.getElementById('editArticleDescription');
const editArticleContent = document.getElementById('editArticleContent');
const editArticleCategory = document.getElementById('editArticleCategory');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const saveArticleBtn = document.getElementById('saveArticleBtn');

// Модалка удаления
const deleteModal = document.getElementById('deleteModal');
const deleteArticleTitle = document.getElementById('deleteArticleTitle');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

// ============================================================
// ЗАГРУЗКА СТАТЕЙ
// ============================================================
async function loadArticles() {
  try {
    const q = query(
      collection(db, "articles"),
      where("role", "==", ROLE),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);
    allArticles = [];

    snapshot.forEach(doc => {
      allArticles.push({
        id: doc.id,
        ...doc.data()
      });
    });

    renderArticles(allArticles);
  } catch (error) {
    console.error("Ошибка загрузки статей:", error);
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Не удалось загрузить статьи</p>
        <p style="font-size:13px; color: #ef4444;">${error.message}</p>
      </div>
    `;
  }
}

// ============================================================
// ОТОБРАЖЕНИЕ СТАТЕЙ
// ============================================================
function renderArticles(articles) {
  if (!articles || articles.length === 0) {
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Пока нет статей для этой должности</p>
        ${isAdmin ? '<p style="font-size:13px; color: var(--text-muted);">Нажмите "Добавить" чтобы создать первую</p>' : ''}
      </div>
    `;
    return;
  }

  articlesContainer.innerHTML = articles.map(article => `
    <div class="article-card" data-id="${article.id}">
      <div class="article-card-header">
        <h3>${article.title || 'Без названия'}</h3>
        <div class="admin-actions-on-card">
          <button class="btn-icon btn-icon-edit ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">✏️</button>
          <button class="btn-icon btn-icon-delete ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">🗑️</button>
        </div>
      </div>

      ${article.description ? `<p class="article-description">${article.description}</p>` : ''}

      <div class="meta">
        <span>📅 ${formatDate(article.createdAt)}</span>
        ${article.category ? `<span>🏷️ ${article.category}</span>` : ''}
        ${article.authorEmail ? `<span>✍️ ${article.authorEmail}</span>` : ''}
      </div>

      <div class="article-content" id="content-${article.id}">
        ${article.content || '<p>Содержание не добавлено</p>'}
      </div>

      <button class="btn-toggle-content" data-id="${article.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  // Клик по кнопке "Читать полностью"
  document.querySelectorAll('.btn-toggle-content').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const content = document.getElementById(`content-${id}`);
      if (content) {
        content.classList.toggle('expanded');
        btn.textContent = content.classList.contains('expanded') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  // Кнопки редактирования
  document.querySelectorAll('.btn-icon-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const article = allArticles.find(a => a.id === id);
      if (article) openEditModal(article);
    });
  });

  // Кнопки удаления
  document.querySelectorAll('.btn-icon-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const article = allArticles.find(a => a.id === id);
      if (article) openDeleteModal(article);
    });
  });
}

// ============================================================
// ФОРМАТИРОВАНИЕ ДАТЫ
// ============================================================
function formatDate(timestamp) {
  if (!timestamp) return 'Неизвестно';
  try {
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('ru-RU', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  } catch {
    return 'Неизвестно';
  }
}

// ============================================================
// ПОИСК
// ============================================================
searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  if (!query) {
    renderArticles(allArticles);
    return;
  }

  const filtered = allArticles.filter(article => {
    const title = (article.title || '').toLowerCase();
    const desc = (article.description || '').toLowerCase();
    const content = (article.content || '').toLowerCase();
    return title.includes(query) || desc.includes(query) || content.includes(query);
  });

  renderArticles(filtered);
});

// ============================================================
// ОТКРЫТИЕ МОДАЛКИ РЕДАКТИРОВАНИЯ
// ============================================================
function openEditModal(article = null) {
  if (article) {
    editModalTitle.textContent = '✏️ Редактировать';
    editArticleId.value = article.id;
    editArticleTitle.value = article.title || '';
    editArticleDescription.value = article.description || '';
    editArticleContent.value = article.content || '';
    editArticleCategory.value = article.category || 'general';
    saveArticleBtn.textContent = 'Обновить';
    editingId = article.id;
  } else {
    editModalTitle.textContent = '➕ Новая статья';
    editArticleId.value = '';
    editArticleTitle.value = '';
    editArticleDescription.value = '';
    editArticleContent.value = '';
    editArticleCategory.value = 'general';
    saveArticleBtn.textContent = 'Добавить';
    editingId = null;
  }

  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ============================================================
// ОТКРЫТИЕ МОДАЛКИ УДАЛЕНИЯ
// ============================================================
function openDeleteModal(article) {
  deletingId = article.id;
  deleteArticleTitle.textContent = `"${article.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ============================================================
// ЗАКРЫТИЕ МОДАЛОК
// ============================================================
function closeEditModal() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editArticleForm.reset();
}

function closeDeleteModal() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEditBtn.addEventListener('click', closeEditModal);
cancelDeleteBtn.addEventListener('click', closeDeleteModal);

editModal.addEventListener('click', (e) => {
  if (e.target === editModal) closeEditModal();
});

deleteModal.addEventListener('click', (e) => {
  if (e.target === deleteModal) closeDeleteModal();
});

// ============================================================
// СОХРАНЕНИЕ СТАТЬИ
// ============================================================
editArticleForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const title = editArticleTitle.value.trim();
  const description = editArticleDescription.value.trim();
  const content = editArticleContent.value.trim();
  const category = editArticleCategory.value;

  if (!title || !content) {
    alert('Заполните название и содержание статьи');
    return;
  }

  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), {
        title,
        description,
        content,
        category,
        updatedAt: serverTimestamp()
      });
    } else {
      await addDoc(collection(db, 'articles'), {
        title,
        description,
        content,
        category,
        role: ROLE,
        authorUid: currentUser?.uid || null,
        authorEmail: currentUser?.email || null,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    closeEditModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка сохранения статьи:', error);
    alert('Не удалось сохранить статью. Попробуйте еще раз.');
  }
});

// ============================================================
// УДАЛЕНИЕ СТАТЬИ
// ============================================================
confirmDeleteBtn.addEventListener('click', async () => {
  if (!deletingId) return;

  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDeleteModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка удаления статьи:', error);
    alert('Не удалось удалить статью. Попробуйте еще раз.');
  }
});

// ============================================================
// ДОБАВЛЕНИЕ СТАТЬИ
// ============================================================
addArticleBtn.addEventListener('click', () => {
  openEditModal(null);
});

// ============================================================
// ПРОВЕРКА АВТОРИЗАЦИИ
// ============================================================
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    if (isAdmin) {
      addArticleBtn.classList.remove('hidden');
    }
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

// Закрытие модалок по Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEditModal();
    if (deleteModal.classList.contains('active')) closeDeleteModal();
  }
});
</script>

</body>
</html>
