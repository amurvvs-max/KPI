<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ПЕРЕМЕННЫЕ
     ============================================================ */
  :root {
    --bg-primary: #f5f7fa;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-glass: rgba(255, 255, 255, 0.85);
    
    --orange-1: #FF6A00;
    --orange-2: #E85D00;
    --orange-3: #FF8C42;
    --orange-4: #FFB380;
    --orange-light: #FFF0E6;
    --orange-glow: rgba(255, 106, 0, 0.15);
    --orange-gradient: linear-gradient(135deg, #FF6A00 0%, #E85D00 50%, #FF8C42 100%);
    --orange-gradient-soft: linear-gradient(135deg, rgba(255, 106, 0, 0.08) 0%, rgba(255, 140, 66, 0.04) 100%);
    
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a5a;
    --text-muted: #8a8a9a;
    --text-white: #ffffff;
    
    --border-light: rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
    --shadow-glow: 0 8px 32px rgba(255, 106, 0, 0.15);
    
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  /* ============================================================
     ГЛОБАЛЬНЫЕ СТИЛИ
     ============================================================ */
  * {
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  body {
    background: 
      radial-gradient(ellipse at 10% 20%, rgba(255, 106, 0, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(255, 106, 0, 0.04) 0%, transparent 50%),
      var(--bg-primary);
  }

  /* ============================================================
     ОСНОВНАЯ ОБЕРТКА
     ============================================================ */
  .page-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 16px;
    position: relative;
    z-index: 1;
  }

  /* ============================================================
     СТЕКЛЯННАЯ КАРТОЧКА
     ============================================================ */
  .glass-card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glass-card:hover {
    box-shadow: var(--shadow-lg), var(--shadow-glow);
  }

  /* ============================================================
     ШАПКА
     ============================================================ */
  .header {
    background: var(--orange-gradient);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -60%;
    right: -10%;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .header-icon {
    font-size: 2.2rem;
    line-height: 1;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
  }

  .header h1 {
    margin: 0;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    font-weight: 700;
    font-family: 'Unbounded', sans-serif;
    flex: 1;
    min-width: 100px;
    color: var(--text-white);
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .btn-glass {
    padding: 9px 16px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--text-white);
    font-weight: 600;
    font-size: clamp(11px, 2.2vw, 13px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }

  .btn-glass:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-2px);
  }

  .btn-glass-primary {
    background: var(--text-white);
    color: var(--orange-1);
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
  }

  .btn-glass-primary:hover {
    background: var(--text-white);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
  }

  .btn-glass-primary.hidden {
    display: none;
  }

  /* ============================================================
     ПОИСК
     ============================================================ */
  .search-wrap {
    margin-bottom: 18px;
  }

  .search-wrap input {
    width: 100%;
    padding: 13px 18px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border-light);
    background: var(--bg-secondary);
    font-size: clamp(14px, 2.8vw, 16px);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-sm);
  }

  .search-wrap input::placeholder {
    color: var(--text-muted);
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--orange-1);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 18px 20px 24px;
  }

  /* ============================================================
     СТАТЬИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 14px;
  }

  .article-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    position: relative;
  }

  .article-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius-md);
    background: var(--orange-gradient-soft);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .article-card:hover {
    border-color: var(--orange-1);
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg), var(--shadow-glow);
  }

  .article-card:hover::before {
    opacity: 1;
  }

  .article-card-header {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .article-card h3 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(0.95rem, 3.2vw, 1.15rem);
    font-weight: 600;
    margin: 0;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    word-break: break-word;
  }

  .article-card .article-description {
    color: var(--text-secondary);
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
    margin: 4px 0 8px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
    z-index: 1;
  }

  .article-card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: clamp(0.65rem, 1.8vw, 0.75rem);
    color: var(--text-muted);
    position: relative;
    z-index: 1;
  }

  .article-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Админ-кнопки */
  .admin-actions-on-card {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    position: relative;
    z-index: 2;
  }

  .btn-icon {
    padding: 5px 12px;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-size: clamp(10px, 1.8vw, 11px);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .btn-icon:hover {
    transform: translateY(-2px);
  }

  .btn-icon-edit:hover {
    border-color: var(--orange-1);
    color: var(--orange-1);
    background: var(--orange-light);
  }

  .btn-icon-delete:hover {
    border-color: #ef4444;
    color: #ef4444;
    background: #fef2f2;
  }

  .btn-icon.hidden {
    display: none;
  }

  .btn-toggle-content {
    background: none;
    border: none;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
    cursor: pointer;
    font-size: clamp(0.78rem, 1.8vw, 0.82rem);
    padding: 8px 4px;
    width: 100%;
    text-align: left;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
    position: relative;
    z-index: 1;
  }

  .btn-toggle-content:hover {
    opacity: 0.8;
  }

  /* ============================================================
     СОДЕРЖИМОЕ СТАТЬИ — ОПТИМИЗИРОВАНО ДЛЯ МОБИЛЬНЫХ
     ============================================================ */
  .article-content {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-light);
    display: none;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    line-height: 1.7;
    color: var(--text-secondary);
    word-wrap: break-word;
    overflow-wrap: break-word;
    position: relative;
    z-index: 1;
  }

  .article-content.expanded {
    display: block;
    animation: fadeSlideIn 0.3s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ДВЕ КОЛОНКИ — НА МОБИЛЬНЫХ СТАНОВЯТСЯ ОДНОЙ */
  .article-content .two-columns {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 14px 0;
  }

  .article-content .two-columns > div {
    flex: 1;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    border: 1px solid var(--border-light);
    min-width: 0;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .article-content .two-columns > div:hover {
    border-color: var(--orange-4);
  }

  .article-content .panel-title {
    font-weight: 700;
    font-size: clamp(0.9rem, 2.8vw, 1rem);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ============================================================
     СПИСКИ — ПРАВИЛЬНЫЕ ОТСТУПЫ НА МОБИЛЬНЫХ
     ============================================================ */
  .article-content .step-list {
    list-style: none;
    padding: 0;
    margin: 0 0 10px 0;
  }

  .article-content .step-list li {
    margin-bottom: 10px;
    padding-left: 26px;
    position: relative;
    line-height: 1.6;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
    word-break: break-word;
    color: var(--text-secondary);
  }

  .article-content .step-list li::before {
    content: "◆";
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: absolute;
    left: 4px;
    top: 2px;
    font-size: clamp(11px, 2vw, 13px);
  }

  .article-content .step-list li strong,
  .article-content .step-list li b {
    color: var(--text-primary);
    font-weight: 600;
  }

  .article-content .step-list li i {
    color: var(--orange-2);
    font-style: italic;
  }

  /* ============================================================
     БЛОКИ — СКРИПТЫ, ВАЖНЫЕ ЗАМЕТКИ, ЗАПРЕТЫ
     ============================================================ */
  .article-content .script {
    background: var(--orange-light);
    border-left: 3px solid var(--orange-1);
    padding: 12px 16px;
    margin: 10px 0;
    border-radius: var(--radius-sm);
    font-weight: 500;
    color: var(--text-primary);
    font-size: clamp(0.82rem, 2.2vw, 0.88rem);
    word-break: break-word;
  }

  .article-content .important-note {
    background: #f0f7ff;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
    font-size: clamp(0.82rem, 2.2vw, 0.88rem);
    border: 1px solid #e0edf5;
    word-break: break-word;
    color: var(--text-secondary);
  }

  .article-content .important-note strong {
    color: var(--text-primary);
  }

  .article-content .forbidden {
    background: #fef2f2;
    border-left: 3px solid #ef4444;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
    word-break: break-word;
  }

  .article-content .forbidden p {
    font-weight: 700;
    color: #dc2626;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
  }

  .article-content .forbidden span {
    font-size: clamp(0.8rem, 2.2vw, 0.88rem);
    color: var(--text-secondary);
  }

  /* ============================================================
     KPI БЕЙДЖ
     ============================================================ */
  .article-content .kpi-badge {
    background: var(--orange-gradient);
    color: var(--text-white);
    border-radius: 30px;
    padding: 4px 16px;
    font-size: clamp(0.6rem, 1.8vw, 0.7rem);
    font-weight: 600;
    display: inline-block;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  /* ============================================================
     ТАБЛИЦЫ — ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ
     ============================================================ */
  .article-content .table-mini {
    margin-top: 10px;
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(0.72rem, 2vw, 0.82rem);
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .article-content .table-mini td,
  .article-content .table-mini th {
    border-bottom: 1px solid var(--border-light);
    padding: 10px 8px;
    vertical-align: top;
    text-align: left;
    word-break: break-word;
    min-width: 60px;
    color: var(--text-secondary);
  }

  .article-content .table-mini th {
    font-weight: 700;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 70px;
    font-size: clamp(0.7rem, 1.8vw, 0.78rem);
  }

  .article-content .table-mini tr:hover td {
    background: var(--bg-primary);
  }

  /* ============================================================
     FLEX КАРТОЧКИ
     ============================================================ */
  .article-content .flex-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 12px 0;
  }

  .article-content .flex-card {
    flex: 1;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    border: 1px solid var(--border-light);
    transition: all 0.3s ease;
    min-width: 0;
  }

  .article-content .flex-card:hover {
    border-color: var(--orange-4);
  }

  .article-content .flex-card .card-title {
    font-weight: 700;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    margin-bottom: 6px;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .article-content .flex-card p {
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
    line-height: 1.6;
    margin: 0;
    color: var(--text-secondary);
    word-break: break-word;
  }

  /* ============================================================
     ПОДВАЛ СТАТЬИ
     ============================================================ */
  .article-content .footer-note {
    margin-top: 16px;
    padding: 16px 20px;
    background: var(--orange-gradient-soft);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 106, 0, 0.08);
    text-align: center;
  }

  .article-content .footer-note .footer-text {
    font-weight: 700;
    font-size: clamp(0.9rem, 2.8vw, 1.1rem);
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .empty-state p {
    margin: 4px 0;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
  }

  /* ============================================================
     МОДАЛКИ
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    animation: fadeIn 0.25s ease;
  }

  .modal-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    max-width: 700px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-content h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    margin: 0 0 4px;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-content .sub {
    color: var(--text-secondary);
    margin: 0 0 14px;
    font-size: clamp(0.78rem, 2.1vw, 0.88rem);
  }

  .modal-content .field {
    margin-bottom: 12px;
  }

  .modal-content .field label {
    display: block;
    font-size: clamp(0.78rem, 2.1vw, 0.83rem);
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 3px;
  }

  .modal-content .field input,
  .modal-content .field textarea,
  .modal-content .field select {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border-light);
    background: var(--bg-primary);
    font-size: clamp(14px, 2.8vw, 16px);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    transition: all 0.3s ease;
  }

  .modal-content .field textarea {
    min-height: 100px;
    resize: vertical;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 2.2vw, 12px);
    line-height: 1.5;
  }

  .modal-content .field input:focus,
  .modal-content .field textarea:focus,
  .modal-content .field select:focus {
    outline: none;
    border-color: var(--orange-1);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 11px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(14px, 2.8vw, 16px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
  }

  .modal-actions .btn-primary {
    background: var(--orange-gradient);
    color: var(--text-white);
    box-shadow: 0 4px 16px rgba(255, 106, 0, 0.3);
  }

  .modal-actions .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255, 106, 0, 0.4);
  }

  .modal-actions .btn-cancel {
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 2px solid var(--border-light);
  }

  .modal-actions .btn-cancel:hover {
    background: var(--border-light);
  }

  .modal-actions .btn-danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: var(--text-white);
    box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
  }

  .modal-actions .btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
  }

  .formatting-hint {
    font-size: clamp(10px, 1.8vw, 11px);
    color: var(--text-muted);
    margin-top: 4px;
    background: var(--bg-primary);
    padding: 6px 10px;
    border-radius: 8px;
    word-break: break-word;
    border: 1px solid var(--border-light);
  }

  .formatting-hint code {
    background: var(--bg-secondary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: clamp(9px, 1.6vw, 10px);
    display: inline-block;
    margin: 1px 1px;
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ============================================================
     АДАПТИВНОСТЬ — МОБИЛЬНЫЕ ПЕРВЫЙ ПОДХОД
     ============================================================ */

  /* ТЕЛЕФОНЫ */
  @media (max-width: 767px) {
    .page-wrap {
      padding: 8px 6px;
    }

    .glass-card {
      border-radius: 16px;
      border: none;
      box-shadow: var(--shadow-md);
    }

    .header {
      padding: 14px 16px;
      border-radius: 16px 16px 0 0;
    }

    .header-icon {
      font-size: 1.8rem;
    }

    .header h1 {
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    }

    .content {
      padding: 12px 12px 16px;
    }

    .article-card {
      padding: 14px 14px;
      border-radius: var(--radius-sm);
    }

    .article-card h3 {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
    }

    .article-content {
      font-size: clamp(0.82rem, 2.8vw, 0.92rem);
      line-height: 1.6;
    }

    .article-content .two-columns > div {
      padding: 12px 14px;
    }

    .article-content .panel-title {
      font-size: clamp(0.85rem, 3vw, 0.95rem);
    }

    .article-content .step-list li {
      font-size: clamp(0.8rem, 2.6vw, 0.9rem);
      padding-left: 22px;
      margin-bottom: 8px;
    }

    .article-content .step-list li::before {
      font-size: clamp(10px, 2vw, 12px);
      left: 2px;
    }

    .article-content .script,
    .article-content .important-note,
    .article-content .forbidden {
      padding: 10px 14px;
      font-size: clamp(0.8rem, 2.6vw, 0.9rem);
    }

    .article-content .flex-card {
      padding: 12px 14px;
    }

    .article-content .footer-note {
      padding: 12px 14px;
    }

    .article-content .footer-note .footer-text {
      font-size: clamp(0.85rem, 3vw, 0.95rem);
    }

    .modal-content {
      padding: 18px 14px;
    }

    .modal-actions .btn {
      font-size: clamp(13px, 3vw, 15px);
      padding: 10px 14px;
    }

    .btn-glass {
      font-size: 11px;
      padding: 7px 12px;
    }
  }

  /* ПЛАНШЕТЫ */
  @media (min-width: 768px) {
    .page-wrap {
      padding: 24px;
    }

    .content {
      padding: 22px 28px 28px;
    }

    .header {
      padding: 22px 28px;
    }

    .header-actions {
      width: auto;
    }

    .article-card-header {
      flex-direction: row;
      align-items: flex-start;
    }

    .admin-actions-on-card {
      flex: none;
    }

    .article-content .two-columns {
      flex-direction: row;
      gap: 18px;
    }

    .article-content .flex-cards {
      flex-direction: row;
      gap: 16px;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-content {
      padding: 28px 32px;
    }
  }

  /* ДЕСКТОП */
  @media (min-width: 1024px) {
    .page-wrap {
      padding: 32px;
    }

    .content {
      padding: 28px 36px 32px;
    }

    .articles-grid {
      gap: 18px;
    }

    .article-card {
      padding: 22px 28px;
    }

    .article-content .two-columns {
      gap: 24px;
    }

    .article-content .two-columns > div {
      padding: 18px 24px;
    }

    .modal-content {
      padding: 32px 36px;
    }
  }

  /* САМЫЕ МАЛЕНЬКИЕ ЭКРАНЫ */
  @media (max-width: 360px) {
    .page-wrap {
      padding: 4px 2px;
    }

    .glass-card {
      border-radius: 12px;
    }

    .header {
      padding: 10px 12px;
    }

    .header-icon {
      font-size: 1.4rem;
    }

    .content {
      padding: 8px 8px 12px;
    }

    .article-card {
      padding: 10px 10px;
    }

    .article-content .step-list li {
      padding-left: 18px;
      font-size: clamp(0.75rem, 2.5vw, 0.82rem);
    }

    .modal-content {
      padding: 12px 10px;
    }

    .modal-actions .btn {
      font-size: 12px;
      padding: 8px 12px;
    }

    .btn-glass {
      font-size: 10px;
      padding: 5px 8px;
    }
  }

  /* ============================================================
     БЕЗОПАСНАЯ ЗОНА ДЛЯ iPhone
     ============================================================ */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(6px, env(safe-area-inset-left));
      padding-right: max(6px, env(safe-area-inset-right));
      padding-top: max(6px, env(safe-area-inset-top));
      padding-bottom: max(6px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 768px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(24px, env(safe-area-inset-left));
        padding-right: max(24px, env(safe-area-inset-right));
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
    }
  }

  /* ============================================================
     СКРОЛЛ
     ============================================================ */
  ::-webkit-scrollbar {
    width: 5px;
    height: 5px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg-primary);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--orange-4);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--orange-1);
  }

  /* ============================================================
     ДОПОЛНИТЕЛЬНЫЕ УТИЛИТЫ
     ============================================================ */
  .gradient-text {
    background: var(--orange-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .gradient-bg {
    background: var(--orange-gradient);
    color: var(--text-white);
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="glass-card">
    <!-- Шапка -->
    <div class="header">
      <div class="header-icon">📚</div>
      <h1>Материалы для УСМ</h1>
      <div class="header-actions">
        <a href="index.html" class="btn-glass">← Назад</a>
        <button class="btn-glass btn-glass-primary hidden" id="addArticleBtn">➕ Добавить</button>
      </div>
    </div>

    <div class="content">
      <!-- Поиск -->
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
      </div>

      <!-- Список статей -->
      <div id="articlesContainer" class="articles-grid">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     МОДАЛКИ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>
    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">
      <div class="field">
        <label for="editArticleTitle">Название статьи *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>
      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>
      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст статьи с HTML-форматированием..."></textarea>
        <div class="formatting-hint">
          💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code>
        </div>
      </div>
      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-content">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color: var(--orange-1); word-break:break-word;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-cancel" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  updateDoc, deleteDoc, doc, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

const articlesContainer = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addArticleBtn = document.getElementById('addArticleBtn');

const editModal = document.getElementById('editModal');
const editModalTitle = document.getElementById('editModalTitle');
const editArticleForm = document.getElementById('editArticleForm');
const editArticleId = document.getElementById('editArticleId');
const editArticleTitle = document.getElementById('editArticleTitle');
const editArticleDescription = document.getElementById('editArticleDescription');
const editArticleContent = document.getElementById('editArticleContent');
const editArticleCategory = document.getElementById('editArticleCategory');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const saveArticleBtn = document.getElementById('saveArticleBtn');

const deleteModal = document.getElementById('deleteModal');
const deleteArticleTitle = document.getElementById('deleteArticleTitle');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

async function loadArticles() {
  try {
    const q = query(collection(db, "articles"), where("role", "==", ROLE), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    allArticles = [];
    snapshot.forEach(doc => allArticles.push({ id: doc.id, ...doc.data() }));
    renderArticles(allArticles);
  } catch (error) {
    console.error("Ошибка загрузки:", error);
    articlesContainer.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Не удалось загрузить статьи</p><p style="font-size:13px; color:#dc2626;">${error.message}</p></div>`;
  }
}

function renderArticles(articles) {
  if (!articles || articles.length === 0) {
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Пока нет статей</p>
        ${isAdmin ? '<p style="font-size:13px; color:var(--text-muted);">Нажмите "Добавить"</p>' : ''}
      </div>`;
    return;
  }

  articlesContainer.innerHTML = articles.map(article => `
    <div class="article-card" data-id="${article.id}">
      <div class="article-card-header">
        <h3>${article.title || 'Без названия'}</h3>
        <div class="admin-actions-on-card">
          <button class="btn-icon btn-icon-edit ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">✏️</button>
          <button class="btn-icon btn-icon-delete ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">🗑️</button>
        </div>
      </div>
      ${article.description ? `<p class="article-description">${article.description}</p>` : ''}
      <div class="meta">
        <span>📅 ${formatDate(article.createdAt)}</span>
        ${article.category ? `<span>🏷️ ${article.category}</span>` : ''}
        ${article.authorEmail ? `<span>✍️ ${article.authorEmail}</span>` : ''}
      </div>
      <div class="article-content" id="content-${article.id}">${article.content || '<p>Содержание не добавлено</p>'}</div>
      <button class="btn-toggle-content" data-id="${article.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  document.querySelectorAll('.btn-toggle-content').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const content = document.getElementById(`content-${id}`);
      if (content) {
        content.classList.toggle('expanded');
        btn.textContent = content.classList.contains('expanded') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  document.querySelectorAll('.btn-icon-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const article = allArticles.find(a => a.id === btn.dataset.id);
      if (article) openEditModal(article);
    });
  });

  document.querySelectorAll('.btn-icon-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const article = allArticles.find(a => a.id === btn.dataset.id);
      if (article) openDeleteModal(article);
    });
  });
}

function formatDate(ts) {
  if (!ts) return 'Неизвестно';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return 'Неизвестно'; }
}

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { renderArticles(allArticles); return; }
  renderArticles(allArticles.filter(a => 
    (a.title || '').toLowerCase().includes(q) ||
    (a.description || '').toLowerCase().includes(q) ||
    (a.content || '').toLowerCase().includes(q)
  ));
});

function openEditModal(article = null) {
  if (article) {
    editModalTitle.textContent = '✏️ Редактировать';
    editArticleId.value = article.id;
    editArticleTitle.value = article.title || '';
    editArticleDescription.value = article.description || '';
    editArticleContent.value = article.content || '';
    editArticleCategory.value = article.category || 'general';
    saveArticleBtn.textContent = 'Обновить';
    editingId = article.id;
  } else {
    editModalTitle.textContent = '➕ Новая статья';
    editArticleId.value = '';
    editArticleTitle.value = '';
    editArticleDescription.value = '';
    editArticleContent.value = '';
    editArticleCategory.value = 'general';
    saveArticleBtn.textContent = 'Добавить';
    editingId = null;
  }
  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function openDeleteModal(article) {
  deletingId = article.id;
  deleteArticleTitle.textContent = `"${article.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editArticleForm.reset();
}

function closeDeleteModal() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEditBtn.addEventListener('click', closeEditModal);
cancelDeleteBtn.addEventListener('click', closeDeleteModal);
editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });
deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });

editArticleForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = editArticleTitle.value.trim();
  const description = editArticleDescription.value.trim();
  const content = editArticleContent.value.trim();
  const category = editArticleCategory.value;
  if (!title || !content) { alert('Заполните название и содержание'); return; }
  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), { title, description, content, category, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'articles'), { title, description, content, category, role: ROLE, authorUid: currentUser?.uid, authorEmail: currentUser?.email, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEditModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка сохранения:', error);
    alert('Не удалось сохранить статью');
  }
});

confirmDeleteBtn.addEventListener('click', async () => {
  if (!deletingId) return;
  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDeleteModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка удаления:', error);
    alert('Не удалось удалить статью');
  }
});

addArticleBtn.addEventListener('click', () => openEditModal(null));

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    if (isAdmin) addArticleBtn.classList.remove('hidden');
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEditModal();
    if (deleteModal.classList.contains('active')) closeDeleteModal();
  }
});
</script>

</body>
</html>
