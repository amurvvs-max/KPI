<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ЕДИНЫЙ СТИЛЬ С АВТОРИЗАЦИЕЙ
     ============================================================ */
  
  /* Глобальные переменные — такие же как на странице входа */
  :root {
    --ink: #1B1E27;
    --ink-soft: #5B6170;
    --bg: #F1F2F5;
    --surface: #FFFFFF;
    --orange: #FF6A00;
    --orange-deep: #E85D00;
    --orange-tint: #FFE9D6;
    --line: #E4E6EB;
    --green: #1E9E5A;
    --red: #D8382B;
    --font-display: "Unbounded", sans-serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 8px;
    --shadow-card: 0 1px 2px rgba(20,22,30,0.04);
  }

  /* ============================================================
     ОСНОВНОЙ ФОН — КАК НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     ГРАДИЕНТНЫЙ ФОН КАК НА МОБИЛЬНОЙ ВЕРСИИ ВХОДА
     ============================================================ */
  @media (max-width: 900px) {
    html, body {
      min-height: 100dvh;
      background: linear-gradient(165deg, #20242F 0%, #1B1E27 55%, #23180F 100%);
    }
  }

  /* ============================================================
     ОБЕРТКА — КАК НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  .page-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 30px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ============================================================
     ГЛАВНАЯ КАРТОЧКА — КАК .card НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  .glass-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--line);
    overflow: hidden;
    transition: box-shadow 0.3s ease;
    position: relative;
  }

  /* ============================================================
     ШАПКА — КАК .brand НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  .header {
    background: var(--ink);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
    border-bottom: 2px solid var(--orange);
  }

  /* Декоративный элемент как на странице входа */
  .header::before {
    content: "";
    position: absolute;
    right: -80px;
    bottom: -80px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,106,0,0.2), transparent 70%);
    pointer-events: none;
  }

  .header-icon {
    font-size: 2.2rem;
    line-height: 1;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 600;
    margin: 0;
    flex: 1;
    min-width: 100px;
    color: #fff;
    position: relative;
    z-index: 1;
    letter-spacing: -0.3px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  /* ============================================================
     КНОПКИ — СТИЛЬ .btn ИЗ СТРАНИЦЫ ВХОДА
     ============================================================ */
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-orange {
    background: var(--orange);
    color: #fff;
  }

  .btn-orange:hover {
    background: var(--orange-deep);
  }

  .btn-ghost {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.25);
  }

  .btn-ghost:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.4);
  }

  .btn-ghost-light {
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }

  .btn-ghost-light:hover {
    background: #F5F6F8;
    border-color: var(--ink-soft);
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn.hidden {
    display: none;
  }

  /* ============================================================
     ПОИСК — КАК НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  .search-wrap {
    margin-bottom: 24px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 18px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--line);
    font-size: 15px;
    font-family: var(--font-body);
    background: #FBFBFC;
    transition: border-color 0.15s ease;
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--orange);
    background: #fff;
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 24px 28px 32px;
  }

  /* ============================================================
     СТАТЬИ — КАРТОЧКИ В СТИЛЕ .badge-card
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 16px;
  }

  .article-card {
    position: relative;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-md);
    padding: 20px 22px;
    cursor: pointer;
    background: var(--surface);
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
  }

  /* Полоска сверху как у .badge-card */
  .article-card::before {
    content: "";
    position: absolute;
    top: -7px;
    left: 24px;
    width: 26px;
    height: 10px;
    border-radius: 5px;
    background: var(--line);
    transition: background 0.15s ease;
  }

  .article-card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(255,106,0,0.12);
  }

  .article-card:hover::before {
    background: var(--orange);
  }

  .article-card-header {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 6px;
  }

  .article-card h3 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    margin: 0;
    color: var(--ink);
    word-break: break-word;
  }

  .article-card .article-description {
    color: var(--ink-soft);
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
    margin: 4px 0 8px;
    line-height: 1.5;
    word-break: break-word;
  }

  .article-card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .article-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Админ-кнопки */
  .admin-actions-on-card {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-icon {
    padding: 4px 12px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: var(--font-body);
  }

  .btn-icon:hover {
    background: #F5F6F8;
  }

  .btn-icon-edit:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  .btn-icon-delete:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .btn-icon.hidden {
    display: none;
  }

  /* Кнопка разворачивания */
  .btn-toggle-content {
    background: none;
    border: none;
    color: var(--orange-deep);
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    padding: 8px 4px;
    width: 100%;
    text-align: left;
    transition: color 0.15s ease;
    font-family: var(--font-body);
  }

  .btn-toggle-content:hover {
    color: var(--orange);
  }

  /* ============================================================
     СОДЕРЖИМОЕ СТАТЬИ
     ============================================================ */
  .article-content {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    display: none;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-soft);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .article-content.expanded {
    display: block;
    animation: fadeSlideIn 0.3s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Стили для контента внутри статьи */
  .article-content ul {
    list-style: none;
    padding: 0;
    margin: 0 0 10px 0;
  }

  .article-content ul li {
    padding-left: 22px;
    position: relative;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .article-content ul li::before {
    content: "●";
    color: var(--orange);
    position: absolute;
    left: 2px;
    top: 0;
  }

  .article-content .script-block {
    background: var(--orange-tint);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 8px 0;
    border-left: 3px solid var(--orange);
  }

  .article-content .note-block {
    background: #F0F7FF;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 8px 0;
    border: 1px solid #E0EDF5;
  }

  .article-content .forbidden-block {
    background: #FDEDEB;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 8px 0;
    border-left: 3px solid var(--red);
  }

  .article-content .forbidden-block .title {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 4px;
  }

  .article-content .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 10px 0;
  }

  .article-content table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 280px;
  }

  .article-content table th {
    border-bottom: 2px solid var(--orange);
    padding: 8px 6px;
    text-align: left;
    color: var(--orange-deep);
    font-weight: 600;
  }

  .article-content table td {
    border-bottom: 1px solid var(--line);
    padding: 8px 6px;
    vertical-align: top;
  }

  .article-content table td:last-child {
    color: var(--red);
  }

  .article-content .badge-kpi {
    background: var(--orange);
    color: #fff;
    padding: 3px 14px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
    margin-bottom: 8px;
  }

  .article-content .flex-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 10px 0;
  }

  .article-content .flex-card {
    background: #F8F9FA;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    border: 1px solid var(--line);
  }

  .article-content .flex-card .card-title {
    font-weight: 700;
    color: var(--orange-deep);
    margin-bottom: 4px;
  }

  .article-content .flex-card p {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  .article-content .footer-note {
    margin-top: 16px;
    padding: 14px 18px;
    background: var(--orange-tint);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,106,0,0.1);
    text-align: center;
    font-weight: 700;
    color: var(--orange-deep);
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-soft);
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  .empty-state p {
    margin: 4px 0;
  }

  /* ============================================================
     МОДАЛКИ — КАК .card НА СТРАНИЦЕ ВХОДА
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    max-width: 700px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-card);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-content h2 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .modal-content .sub {
    color: var(--ink-soft);
    margin: 0 0 16px;
    font-size: 14px;
  }

  .modal-content .field {
    margin-bottom: 14px;
  }

  .modal-content .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .modal-content .field input,
  .modal-content .field textarea,
  .modal-content .field select {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--line);
    font-size: 14px;
    font-family: var(--font-body);
    background: #FBFBFC;
    transition: border-color 0.15s ease;
  }

  .modal-content .field textarea {
    min-height: 120px;
    resize: vertical;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
  }

  .modal-content .field input:focus,
  .modal-content .field textarea:focus,
  .modal-content .field select:focus {
    outline: none;
    border-color: var(--orange);
    background: #fff;
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .modal-actions .btn-primary {
    background: var(--orange);
    color: #fff;
  }

  .modal-actions .btn-primary:hover {
    background: var(--orange-deep);
  }

  .modal-actions .btn-cancel {
    background: #F5F6F8;
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }

  .modal-actions .btn-cancel:hover {
    background: var(--line);
  }

  .modal-actions .btn-danger {
    background: var(--red);
    color: #fff;
  }

  .modal-actions .btn-danger:hover {
    background: #C0392B;
  }

  .modal-actions .btn:active {
    transform: scale(0.98);
  }

  .formatting-hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 4px;
    background: #F5F6F8;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
  }

  .formatting-hint code {
    background: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--orange-deep);
    font-family: var(--font-mono);
    border: 1px solid var(--line);
  }

  /* ============================================================
     АДАПТИВНОСТЬ
     ============================================================ */

  /* Телефоны */
  @media (max-width: 767px) {
    .page-wrap {
      padding: 12px 12px 60px;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 2px solid var(--orange);
    }

    .header-icon {
      font-size: 1.6rem;
    }

    .header h1 {
      font-size: clamp(0.85rem, 4vw, 1.1rem);
    }

    .content {
      padding: 14px 14px 20px;
    }

    .article-card {
      padding: 14px 14px;
    }

    .article-card h3 {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
    }

    .article-content {
      font-size: 13px;
    }

    .modal-content {
      padding: 18px 14px;
    }

    .modal-actions .btn {
      font-size: 13px;
      padding: 10px 14px;
    }

    .btn {
      font-size: 12px;
      padding: 8px 14px;
    }
  }

  /* Телефоны с очень маленьким экраном */
  @media (max-width: 360px) {
    .page-wrap {
      padding: 6px 6px 40px;
    }

    .header {
      padding: 10px 12px;
    }

    .header-icon {
      font-size: 1.3rem;
    }

    .content {
      padding: 10px 10px 16px;
    }

    .article-card {
      padding: 10px 10px;
    }

    .btn {
      font-size: 10px;
      padding: 6px 10px;
    }
  }

  /* Планшеты и десктоп */
  @media (min-width: 768px) {
    .page-wrap {
      padding: 40px 24px 80px;
    }

    .content {
      padding: 28px 32px 36px;
    }

    .article-card-header {
      flex-direction: row;
      align-items: flex-start;
    }

    .admin-actions-on-card {
      flex: none;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-content {
      padding: 32px 36px;
    }
  }

  /* ============================================================
     БЕЗОПАСНАЯ ЗОНА ДЛЯ IPHONE
     ============================================================ */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(60px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 768px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(24px, env(safe-area-inset-left));
        padding-right: max(24px, env(safe-area-inset-right));
        padding-top: max(40px, env(safe-area-inset-top));
        padding-bottom: max(80px, env(safe-area-inset-bottom));
      }
    }
  }

  /* ============================================================
     СКРОЛЛ
     ============================================================ */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--ink-soft);
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="glass-card">

    <!-- ============================================================
         ШАПКА — СТИЛЬ .brand ИЗ СТРАНИЦЫ ВХОДА
         ============================================================ -->
    <div class="header">
      <div class="header-icon">📚</div>
      <h1>Материалы для УСМ</h1>
      <div class="header-actions">
        <a href="index.html" class="btn btn-ghost">← Назад</a>
        <button class="btn btn-orange hidden" id="addArticleBtn">➕ Добавить</button>
      </div>
    </div>

    <!-- ============================================================
         КОНТЕНТ
         ============================================================ -->
    <div class="content">
      <!-- Поиск -->
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
      </div>

      <!-- Список статей -->
      <div id="articlesContainer" class="articles-grid">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     МОДАЛКА ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>

    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">

      <div class="field">
        <label for="editArticleTitle">Название статьи *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>

      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>

      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст статьи с HTML-форматированием..."></textarea>
        <div class="formatting-hint">
          💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code>
        </div>
      </div>

      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА УДАЛЕНИЯ
     ============================================================ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-content">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color: var(--orange-deep); word-break:break-word;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-cancel" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  updateDoc, deleteDoc, doc, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

const articlesContainer = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addArticleBtn = document.getElementById('addArticleBtn');

const editModal = document.getElementById('editModal');
const editModalTitle = document.getElementById('editModalTitle');
const editArticleForm = document.getElementById('editArticleForm');
const editArticleId = document.getElementById('editArticleId');
const editArticleTitle = document.getElementById('editArticleTitle');
const editArticleDescription = document.getElementById('editArticleDescription');
const editArticleContent = document.getElementById('editArticleContent');
const editArticleCategory = document.getElementById('editArticleCategory');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const saveArticleBtn = document.getElementById('saveArticleBtn');

const deleteModal = document.getElementById('deleteModal');
const deleteArticleTitle = document.getElementById('deleteArticleTitle');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

async function loadArticles() {
  try {
    const q = query(collection(db, "articles"), where("role", "==", ROLE), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    allArticles = [];
    snapshot.forEach(doc => allArticles.push({ id: doc.id, ...doc.data() }));
    renderArticles(allArticles);
  } catch (error) {
    console.error("Ошибка загрузки:", error);
    articlesContainer.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Не удалось загрузить статьи</p><p style="font-size:13px; color:var(--red);">${error.message}</p></div>`;
  }
}

function renderArticles(articles) {
  if (!articles || articles.length === 0) {
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Пока нет статей</p>
        ${isAdmin ? '<p style="font-size:13px;">Нажмите "Добавить" чтобы создать первую</p>' : ''}
      </div>`;
    return;
  }

  articlesContainer.innerHTML = articles.map(article => `
    <div class="article-card" data-id="${article.id}">
      <div class="article-card-header">
        <h3>${article.title || 'Без названия'}</h3>
        <div class="admin-actions-on-card">
          <button class="btn-icon btn-icon-edit ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">✏️</button>
          <button class="btn-icon btn-icon-delete ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">🗑️</button>
        </div>
      </div>
      ${article.description ? `<p class="article-description">${article.description}</p>` : ''}
      <div class="meta">
        <span>📅 ${formatDate(article.createdAt)}</span>
        ${article.category ? `<span>🏷️ ${article.category}</span>` : ''}
        ${article.authorEmail ? `<span>✍️ ${article.authorEmail}</span>` : ''}
      </div>
      <div class="article-content" id="content-${article.id}">${article.content || '<p>Содержание не добавлено</p>'}</div>
      <button class="btn-toggle-content" data-id="${article.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  document.querySelectorAll('.btn-toggle-content').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const content = document.getElementById(`content-${id}`);
      if (content) {
        content.classList.toggle('expanded');
        btn.textContent = content.classList.contains('expanded') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  document.querySelectorAll('.btn-icon-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const article = allArticles.find(a => a.id === btn.dataset.id);
      if (article) openEditModal(article);
    });
  });

  document.querySelectorAll('.btn-icon-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const article = allArticles.find(a => a.id === btn.dataset.id);
      if (article) openDeleteModal(article);
    });
  });
}

function formatDate(ts) {
  if (!ts) return 'Неизвестно';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return 'Неизвестно'; }
}

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { renderArticles(allArticles); return; }
  renderArticles(allArticles.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.description || '').toLowerCase().includes(q) ||
    (a.content || '').toLowerCase().includes(q)
  ));
});

function openEditModal(article = null) {
  if (article) {
    editModalTitle.textContent = '✏️ Редактировать';
    editArticleId.value = article.id;
    editArticleTitle.value = article.title || '';
    editArticleDescription.value = article.description || '';
    editArticleContent.value = article.content || '';
    editArticleCategory.value = article.category || 'general';
    saveArticleBtn.textContent = 'Обновить';
    editingId = article.id;
  } else {
    editModalTitle.textContent = '➕ Новая статья';
    editArticleId.value = '';
    editArticleTitle.value = '';
    editArticleDescription.value = '';
    editArticleContent.value = '';
    editArticleCategory.value = 'general';
    saveArticleBtn.textContent = 'Добавить';
    editingId = null;
  }
  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function openDeleteModal(article) {
  deletingId = article.id;
  deleteArticleTitle.textContent = `"${article.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editArticleForm.reset();
}

function closeDeleteModal() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEditBtn.addEventListener('click', closeEditModal);
cancelDeleteBtn.addEventListener('click', closeDeleteModal);
editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });
deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });

editArticleForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = editArticleTitle.value.trim();
  const description = editArticleDescription.value.trim();
  const content = editArticleContent.value.trim();
  const category = editArticleCategory.value;
  if (!title || !content) { alert('Заполните название и содержание'); return; }
  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), { title, description, content, category, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'articles'), { title, description, content, category, role: ROLE, authorUid: currentUser?.uid, authorEmail: currentUser?.email, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEditModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка сохранения:', error);
    alert('Не удалось сохранить статью');
  }
});

confirmDeleteBtn.addEventListener('click', async () => {
  if (!deletingId) return;
  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDeleteModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка удаления:', error);
    alert('Не удалось удалить статью');
  }
});

addArticleBtn.addEventListener('click', () => openEditModal(null));

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    if (isAdmin) addArticleBtn.classList.remove('hidden');
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEditModal();
    if (deleteModal.classList.contains('active')) closeDeleteModal();
  }
});
</script>

</body>
</html>
