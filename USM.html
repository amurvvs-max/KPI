<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ПЕРЕМЕННЫЕ
     ============================================================ */
  :root {
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --ink: #1A1A2E;
    --ink-soft: #5A5A6E;
    --ink-muted: #9A9AAE;
    --orange: #FF6A00;
    --orange-deep: #E85D00;
    --orange-light: #FFF0E6;
    --orange-glow: rgba(255,106,0,0.12);
    --line: #E8ECF0;
    --red: #DC3545;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-fab: 0 6px 24px rgba(255,106,0,0.35);
    --radius: 12px;
    --font-display: "Unbounded", sans-serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * {
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--ink);
    margin: 0;
    padding: 0;
  }

  /* ============================================================
     ОБЕРТКА — НОЛЬ ОТСТУПОВ
     ============================================================ */
  .page-wrap {
    max-width: 100%;
    margin: 0;
    padding: 0;
    position: relative;
  }

  /* ============================================================
     КАРТОЧКА — БЕЗ ОТСТУПОВ И БЕЗ СКРУГЛЕНИЙ
     ============================================================ */
  .card {
    background: var(--surface);
    border-radius: 0;
    box-shadow: none;
    border: none;
    overflow: hidden;
  }

  /* ============================================================
     ШАПКА — ВПЛОТНУЮ К КРАЯМ
     ============================================================ */
  .header {
    padding: 10px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    flex-wrap: nowrap;
    width: 100%;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex-shrink: 1;
  }

  .header-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(0.75rem, 3.5vw, 0.95rem);
    font-weight: 600;
    margin: 0;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  /* ============================================================
     ВЫПАДАЮЩИЙ СПИСОК ДОЛЖНОСТЕЙ
     ============================================================ */
  .dropdown {
    position: relative;
    display: inline-block;
  }

  .dropdown-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 5px 8px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink-soft);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    min-height: 28px;
  }

  .dropdown-btn:hover {
    background: var(--line);
  }

  .dropdown-btn:active {
    transform: scale(0.95);
  }

  .dropdown-btn .arrow {
    font-size: 8px;
    transition: transform 0.2s ease;
  }

  .dropdown-btn.open .arrow {
    transform: rotate(180deg);
  }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 150px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    overflow: hidden;
    display: none;
    z-index: 50;
    animation: dropIn 0.2s ease;
  }

  .dropdown-menu.open {
    display: block;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    text-decoration: none;
    color: var(--ink);
    font-size: 12px;
    font-weight: 500;
    transition: background 0.15s ease;
    border-bottom: 1px solid var(--line);
  }

  .dropdown-menu a:last-child {
    border-bottom: none;
  }

  .dropdown-menu a:hover {
    background: var(--orange-light);
  }

  .dropdown-menu a .check {
    margin-left: auto;
    color: var(--orange);
    font-weight: 700;
  }

  .dropdown-menu a.active {
    background: var(--orange-light);
    color: var(--orange-deep);
  }

  /* ============================================================
     ПОИСК — ВО ВСЮ ШИРИНУ
     ============================================================ */
  .search-wrap {
    padding: 8px 10px 0;
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--line);
    font-size: 13px;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    transition: all 0.2s ease;
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--orange);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  /* ============================================================
     КОНТЕНТ — МИНИМАЛЬНЫЕ ОТСТУПЫ
     ============================================================ */
  .content {
    padding: 8px 10px 70px;
  }

  /* ============================================================
     СТАТЬИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 8px;
  }

  .article-card {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 10px 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
  }

  .article-card:hover {
    border-color: var(--orange);
    box-shadow: 0 4px 16px rgba(255,106,0,0.08);
  }

  .article-card:active {
    transform: scale(0.98);
  }

  .article-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 4px;
    margin-bottom: 2px;
    width: 100%;
  }

  .article-head h3 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(0.8rem, 3vw, 0.95rem);
    margin: 0;
    color: var(--ink);
    word-break: break-word;
    flex: 1;
  }

  .article-actions {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }

  .btn-sm {
    padding: 2px 6px;
    border: 1.5px solid var(--line);
    border-radius: 5px;
    background: transparent;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-body);
    min-height: 22px;
  }

  .btn-sm:hover {
    background: var(--bg);
  }

  .btn-sm.edit:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-light);
  }

  .btn-sm.delete:hover {
    border-color: var(--red);
    color: var(--red);
    background: #FDEDEB;
  }

  .btn-sm.hidden {
    display: none;
  }

  .article-desc {
    color: var(--ink-soft);
    font-size: clamp(0.75rem, 2.2vw, 0.85rem);
    margin: 2px 0 4px;
    line-height: 1.4;
  }

  .article-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 10px;
    color: var(--ink-muted);
  }

  .article-meta span {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* ============================================================
     КНОПКА РАЗВОРАЧИВАНИЯ
     ============================================================ */
  .btn-expand {
    background: none;
    border: none;
    color: var(--orange);
    font-weight: 600;
    font-size: 11px;
    cursor: pointer;
    padding: 6px 4px 2px;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    transition: color 0.2s ease;
  }

  .btn-expand:hover {
    color: var(--orange-deep);
  }

  /* ============================================================
     ТЕЛО СТАТЬИ
     ============================================================ */
  .article-body {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    display: none;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-soft);
    width: 100%;
  }

  .article-body.open {
    display: block;
    animation: fade 0.25s ease;
  }

  @keyframes fade {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .article-body ul {
    list-style: none;
    padding: 0;
    margin: 0 0 4px;
  }

  .article-body ul li {
    padding-left: 18px;
    position: relative;
    margin-bottom: 3px;
    line-height: 1.5;
  }

  .article-body ul li::before {
    content: "•";
    color: var(--orange);
    position: absolute;
    left: 2px;
    top: 0;
  }

  .article-body .script {
    background: var(--orange-light);
    padding: 6px 10px;
    border-radius: 6px;
    margin: 4px 0;
    border-left: 3px solid var(--orange);
    color: var(--ink);
    font-size: 12px;
  }

  .article-body .note {
    background: #F0F7FF;
    padding: 6px 10px;
    border-radius: 6px;
    margin: 4px 0;
    border: 1px solid #E0EDF5;
    font-size: 12px;
  }

  .article-body .danger {
    background: #FDEDEB;
    padding: 6px 10px;
    border-radius: 6px;
    margin: 4px 0;
    border-left: 3px solid var(--red);
    font-size: 12px;
  }

  .article-body .danger .lbl {
    font-weight: 700;
    color: var(--red);
  }

  .article-body .table-wrap {
    overflow-x: auto;
    margin: 4px 0;
  }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    min-width: 200px;
  }

  .article-body table th {
    border-bottom: 2px solid var(--orange);
    padding: 4px 4px;
    text-align: left;
    color: var(--orange-deep);
    font-weight: 600;
  }

  .article-body table td {
    border-bottom: 1px solid var(--line);
    padding: 4px 4px;
    vertical-align: top;
  }

  .article-body .badge {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    padding: 2px 10px;
    border-radius: 30px;
    font-size: 9px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .article-body .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 4px 0;
  }

  .article-body .flex-grid .item {
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
  }

  .article-body .flex-grid .item .ttl {
    font-weight: 700;
    color: var(--orange-deep);
    margin-bottom: 2px;
  }

  .article-body .flex-grid .item p {
    margin: 0;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .article-body .footer {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--orange-light);
    border-radius: 6px;
    text-align: center;
    font-weight: 700;
    color: var(--orange-deep);
    font-size: 12px;
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty {
    text-align: center;
    padding: 30px 10px;
    color: var(--ink-muted);
  }

  .empty .icon {
    font-size: 28px;
    margin-bottom: 4px;
    opacity: 0.4;
  }

  /* ============================================================
     FLOATING ACTION BUTTON
     ============================================================ */
  .fab {
    position: fixed;
    bottom: 16px;
    right: 12px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: var(--orange);
    color: #fff;
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: var(--shadow-fab);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    touch-action: manipulation;
  }

  .fab:hover {
    background: var(--orange-deep);
    transform: scale(1.08);
    box-shadow: 0 8px 32px rgba(255,106,0,0.45);
  }

  .fab:active {
    transform: scale(0.92);
  }

  .fab.hidden {
    display: none;
  }

  .fab.show {
    animation: fabIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes fabIn {
    from { opacity: 0; transform: scale(0.6) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ============================================================
     МОДАЛКИ
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 14px;
    max-width: 680px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.15);
    border: 1px solid var(--line);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-box h2 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .modal-box .sub {
    color: var(--ink-soft);
    font-size: 12px;
    margin: 0 0 12px;
  }

  .modal-box .field {
    margin-bottom: 8px;
  }

  .modal-box .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 2px;
  }

  .modal-box .field input,
  .modal-box .field textarea,
  .modal-box .field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--line);
    font-size: 13px;
    font-family: var(--font-body);
    background: var(--bg);
    transition: all 0.2s ease;
    color: var(--ink);
  }

  .modal-box .field textarea {
    min-height: 70px;
    resize: vertical;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .modal-box .field input:focus,
  .modal-box .field textarea:focus,
  .modal-box .field select:focus {
    outline: none;
    border-color: var(--orange);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    font-family: var(--font-body);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .modal-actions .btn-primary {
    background: var(--orange);
    color: #fff;
  }

  .modal-actions .btn-primary:hover {
    background: var(--orange-deep);
  }

  .modal-actions .btn-secondary {
    background: var(--bg);
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }

  .modal-actions .btn-secondary:hover {
    background: var(--line);
  }

  .modal-actions .btn-danger {
    background: var(--red);
    color: #fff;
  }

  .modal-actions .btn-danger:hover {
    background: #c0392b;
  }

  .hint {
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 3px;
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid var(--line);
  }

  .hint code {
    background: var(--surface);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 9px;
    color: var(--orange-deep);
    font-family: var(--font-mono);
    border: 1px solid var(--line);
  }

  /* ============================================================
     АДАПТИВНОСТЬ
     ============================================================ */

  /* ТЕЛЕФОНЫ — НОЛЬ ОТСТУПОВ */
  @media (max-width: 480px) {
    .header {
      padding: 6px 6px;
    }

    .header-icon {
      font-size: 1rem;
    }

    .header h1 {
      font-size: clamp(0.65rem, 3.5vw, 0.8rem);
    }

    .dropdown-btn {
      font-size: 9px;
      padding: 3px 6px;
      min-height: 24px;
      border-radius: 4px;
    }

    .search-wrap {
      padding: 6px 6px 0;
    }

    .search-wrap input {
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
    }

    .content {
      padding: 6px 6px 60px;
    }

    .article-card {
      padding: 6px 6px;
      border-radius: 6px;
    }

    .article-head h3 {
      font-size: clamp(0.7rem, 3.5vw, 0.8rem);
    }

    .btn-sm {
      font-size: 9px;
      padding: 1px 4px;
      min-height: 18px;
      border-radius: 4px;
    }

    .article-body {
      font-size: 11px;
    }

    .modal-box {
      padding: 12px 10px;
    }

    .dropdown-menu {
      min-width: 120px;
      right: -4px;
    }

    .dropdown-menu a {
      font-size: 11px;
      padding: 5px 10px;
    }

    .fab {
      width: 44px;
      height: 44px;
      font-size: 20px;
      bottom: 10px;
      right: 10px;
    }
  }

  /* ПЛАНШЕТЫ */
  @media (min-width: 481px) and (max-width: 768px) {
    .header {
      padding: 8px 10px;
    }

    .content {
      padding: 8px 10px 70px;
    }

    .search-wrap {
      padding: 8px 10px 0;
    }

    .fab {
      bottom: 16px;
      right: 16px;
    }
  }

  /* ДЕСКТОП — ОГРАНИЧЕНИЕ 800px С ЦЕНТРИРОВАНИЕМ */
  @media (min-width: 769px) {
    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 12px 0;
    }

    .card {
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .header {
      padding: 12px 16px;
    }

    .content {
      padding: 12px 16px 80px;
    }

    .search-wrap {
      padding: 12px 16px 0;
    }

    .articles-grid {
      gap: 10px;
    }

    .article-card {
      padding: 14px 16px;
    }

    .article-body .flex-grid {
      flex-direction: row;
    }

    .article-body .flex-grid .item {
      flex: 1;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-box {
      padding: 24px 28px;
    }

    .fab {
      width: 56px;
      height: 56px;
      font-size: 28px;
      bottom: 28px;
      right: 28px;
    }
  }

  /* SAFE AREA */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(0px, env(safe-area-inset-left));
      padding-right: max(0px, env(safe-area-inset-right));
      padding-top: max(0px, env(safe-area-inset-top));
      padding-bottom: max(0px, env(safe-area-inset-bottom));
    }
    .fab {
      bottom: max(10px, env(safe-area-inset-bottom));
      right: max(10px, env(safe-area-inset-right));
    }
  }

  @media (max-width: 480px) {
    @supports (padding: max(0px)) {
      .fab {
        bottom: max(10px, env(safe-area-inset-bottom));
        right: max(10px, env(safe-area-inset-right));
      }
    }
  }

  @media (min-width: 769px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
        padding-top: max(12px, env(safe-area-inset-top));
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
      .fab {
        bottom: max(28px, env(safe-area-inset-bottom));
        right: max(28px, env(safe-area-inset-right));
      }
    }
  }

  ::-webkit-scrollbar {
    width: 3px;
    height: 3px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="card">

    <!-- ============================================================
         ШАПКА
         ============================================================ -->
    <div class="header">
      <div class="header-left">
        <span class="header-icon">📚</span>
        <h1>Материалы для УСМ</h1>
      </div>
      <div class="header-actions">

        <!-- ВЫПАДАЮЩИЙ СПИСОК ДОЛЖНОСТЕЙ -->
        <div class="dropdown" id="roleDropdown">
          <button class="dropdown-btn" id="dropdownBtn">
            ⚡ УСМ <span class="arrow">▼</span>
          </button>
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="#" data-role="usm" class="active">
              ⚡ УСМ <span class="check">✓</span>
            </a>
            <a href="#" data-role="sklad">
              📦 Кладовщик
            </a>
            <a href="#" data-role="pk">
              🛍️ Продавец
            </a>
          </div>
        </div>

      </div>
    </div>

    <!-- ============================================================
         ПОИСК
         ============================================================ -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
    </div>

    <!-- ============================================================
         КОНТЕНТ
         ============================================================ -->
    <div class="content">
      <div id="articlesContainer" class="articles-grid">
        <div class="empty">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     FLOATING ACTION BUTTON
     ============================================================ -->
<button class="fab hidden" id="addArticleBtn" aria-label="Добавить статью">
  +
</button>

<!-- ============================================================
     МОДАЛКИ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>
    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">
      <div class="field">
        <label for="editArticleTitle">Название *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>
      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>
      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст с HTML-форматированием..."></textarea>
        <div class="hint">💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code></div>
      </div>
      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА УДАЛЕНИЯ
     ============================================================ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color:var(--orange-deep);"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  updateDoc, deleteDoc, doc, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL, POSITION_PAGES } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

// DOM
const container = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addBtn = document.getElementById('addArticleBtn');

// Роли
const dropdownBtn = document.getElementById('dropdownBtn');
const dropdownMenu = document.getElementById('dropdownMenu');

const editModal = document.getElementById('editModal');
const editTitle = document.getElementById('editModalTitle');
const editForm = document.getElementById('editArticleForm');
const editId = document.getElementById('editArticleId');
const editName = document.getElementById('editArticleTitle');
const editDesc = document.getElementById('editArticleDescription');
const editContent = document.getElementById('editArticleContent');
const editCat = document.getElementById('editArticleCategory');
const cancelEdit = document.getElementById('cancelEditBtn');
const saveBtn = document.getElementById('saveArticleBtn');

const deleteModal = document.getElementById('deleteModal');
const deleteTitle = document.getElementById('deleteArticleTitle');
const cancelDelete = document.getElementById('cancelDeleteBtn');
const confirmDelete = document.getElementById('confirmDeleteBtn');

// ============================================================
// ВЫПАДАЮЩИЙ СПИСОК
// ============================================================
dropdownBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.classList.toggle('open');
  dropdownBtn.classList.toggle('open');
});

document.addEventListener('click', () => {
  dropdownMenu.classList.remove('open');
  dropdownBtn.classList.remove('open');
});

dropdownMenu.querySelectorAll('a').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    const role = item.dataset.role;
    const label = item.textContent.trim().replace('✓', '').trim();
    dropdownBtn.innerHTML = `${label} <span class="arrow">▼</span>`;

    dropdownMenu.querySelectorAll('a').forEach(a => a.classList.remove('active'));
    item.classList.add('active');

    dropdownMenu.classList.remove('open');
    dropdownBtn.classList.remove('open');

    window.location.href = POSITION_PAGES[role].page;
  });
});

// ============================================================
// ЗАГРУЗКА СТАТЕЙ
// ============================================================
async function loadArticles() {
  try {
    const q = query(collection(db, "articles"), where("role", "==", ROLE), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allArticles = [];
    snap.forEach(d => allArticles.push({ id: d.id, ...d.data() }));
    render(allArticles);
  } catch (e) {
    container.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Ошибка загрузки</p></div>`;
    console.error(e);
  }
}

// ============================================================
// ОТОБРАЖЕНИЕ
// ============================================================
function render(articles) {
  if (!articles || !articles.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📖</div>
        <p>Пока нет статей</p>
        ${isAdmin ? '<p style="font-size:11px;">Нажмите ➕ чтобы создать первую</p>' : ''}
      </div>`;
    return;
  }

  container.innerHTML = articles.map(a => `
    <div class="article-card" data-id="${a.id}">
      <div class="article-head">
        <h3>${a.title || 'Без названия'}</h3>
        <div class="article-actions">
          <button class="btn-sm edit ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">✏️</button>
          <button class="btn-sm delete ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">🗑️</button>
        </div>
      </div>
      ${a.description ? `<div class="article-desc">${a.description}</div>` : ''}
      <div class="article-meta">
        <span>📅 ${formatDate(a.createdAt)}</span>
        ${a.category ? `<span>🏷️ ${a.category}</span>` : ''}
        ${a.authorEmail ? `<span>✉️ ${a.authorEmail}</span>` : ''}
      </div>
      <div class="article-body" id="body-${a.id}">${a.content || '<p>Содержание не добавлено</p>'}</div>
      <button class="btn-expand" data-id="${a.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  document.querySelectorAll('.btn-expand').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = b.dataset.id;
      const body = document.getElementById(`body-${id}`);
      if (body) {
        body.classList.toggle('open');
        b.textContent = body.classList.contains('open') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  document.querySelectorAll('.edit').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openEdit(a);
    });
  });

  document.querySelectorAll('.delete').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openDelete(a);
    });
  });
}

function formatDate(ts) {
  if (!ts) return 'Неизвестно';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return 'Неизвестно'; }
}

// ============================================================
// ПОИСК
// ============================================================
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { render(allArticles); return; }
  render(allArticles.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.description || '').toLowerCase().includes(q) ||
    (a.content || '').toLowerCase().includes(q)
  ));
});

// ============================================================
// МОДАЛКИ
// ============================================================
function openEdit(a = null) {
  if (a) {
    editTitle.textContent = '✏️ Редактировать';
    editId.value = a.id;
    editName.value = a.title || '';
    editDesc.value = a.description || '';
    editContent.value = a.content || '';
    editCat.value = a.category || 'general';
    saveBtn.textContent = 'Обновить';
    editingId = a.id;
  } else {
    editTitle.textContent = '➕ Новая статья';
    editId.value = '';
    editName.value = '';
    editDesc.value = '';
    editContent.value = '';
    editCat.value = 'general';
    saveBtn.textContent = 'Добавить';
    editingId = null;
  }
  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function openDelete(a) {
  deletingId = a.id;
  deleteTitle.textContent = `"${a.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editForm.reset();
}

function closeDelete() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEdit.addEventListener('click', closeEdit);
cancelDelete.addEventListener('click', closeDelete);
editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });
deleteModal.addEventListener('click', e => { if (e.target === deleteModal) closeDelete(); });

// ============================================================
// СОХРАНЕНИЕ
// ============================================================
editForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = editName.value.trim();
  const desc = editDesc.value.trim();
  const content = editContent.value.trim();
  const cat = editCat.value;
  if (!title || !content) { alert('Заполните название и содержание'); return; }
  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), { title, description: desc, content, category: cat, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'articles'), { title, description: desc, content, category: cat, role: ROLE, authorUid: currentUser?.uid, authorEmail: currentUser?.email, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEdit();
    await loadArticles();
  } catch (e) {
    alert('Ошибка сохранения');
    console.error(e);
  }
});

// ============================================================
// УДАЛЕНИЕ
// ============================================================
confirmDelete.addEventListener('click', async () => {
  if (!deletingId) return;
  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDelete();
    await loadArticles();
  } catch (e) {
    alert('Ошибка удаления');
    console.error(e);
  }
});

// ============================================================
// FAB
// ============================================================
addBtn.addEventListener('click', () => openEdit(null));

function updateFab() {
  if (isAdmin) {
    addBtn.classList.remove('hidden');
    setTimeout(() => {
      addBtn.classList.add('show');
    }, 100);
  } else {
    addBtn.classList.add('hidden');
    addBtn.classList.remove('show');
  }
}

// ============================================================
// АВТОРИЗАЦИЯ
// ============================================================
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    updateFab();
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEdit();
    if (deleteModal.classList.contains('active')) closeDelete();
  }
});
</script>

</body>
</html>
