<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ГЛОБАЛЬНЫЙ СБРОС — НОЛЬ ОТСТУПОВ
     ============================================================ */
  * {
    -webkit-tap-highlight-color: transparent;
    margin: 0 !important;
    padding: 0 !important;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #F5F7FA;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1A1A2E;
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: hidden;
  }

  /* ============================================================
     ОБЕРТКА — ПОЛНАЯ ШИРИНА
     ============================================================ */
  .page-wrap {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ============================================================
     КАРТОЧКА — ВО ВСЮ ШИРИНУ
     ============================================================ */
  .card {
    width: 100% !important;
    max-width: 100% !important;
    background: #FFFFFF;
    border-radius: 0 !important;
    box-shadow: none !important;
    border: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ============================================================
     ШАПКА — ВПЛОТНУЮ К КРАЯМ
     ============================================================ */
  .header {
    padding: 6px 6px !important;
    background: #FFFFFF;
    border-bottom: 1px solid #E8ECF0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    flex-wrap: nowrap;
    width: 100%;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 1;
    min-width: 0;
  }

  .header-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: "Unbounded", sans-serif;
    font-size: clamp(0.7rem, 3.2vw, 0.9rem);
    font-weight: 600;
    margin: 0 !important;
    color: #1A1A2E;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }

  /* ============================================================
     ВЫПАДАЮЩИЙ СПИСОК
     ============================================================ */
  .dropdown {
    position: relative;
    display: inline-block;
  }

  .dropdown-btn {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 4px 6px !important;
    border: 1.5px solid #E8ECF0;
    border-radius: 4px;
    background: #F5F7FA;
    color: #5A5A6E;
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    min-height: 24px;
  }

  .dropdown-btn .arrow {
    font-size: 7px;
    transition: transform 0.2s ease;
  }

  .dropdown-btn.open .arrow {
    transform: rotate(180deg);
  }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 2px);
    right: 0;
    min-width: 130px;
    background: #FFFFFF;
    border: 1px solid #E8ECF0;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    overflow: hidden;
    display: none;
    z-index: 50;
  }

  .dropdown-menu.open {
    display: block;
  }

  .dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px !important;
    text-decoration: none;
    color: #1A1A2E;
    font-size: 11px;
    font-weight: 500;
    border-bottom: 1px solid #E8ECF0;
    transition: background 0.15s ease;
  }

  .dropdown-menu a:last-child {
    border-bottom: none;
  }

  .dropdown-menu a:hover {
    background: #FFF0E6;
  }

  .dropdown-menu a .check {
    margin-left: auto;
    color: #FF6A00;
    font-weight: 700;
  }

  .dropdown-menu a.active {
    background: #FFF0E6;
    color: #E85D00;
  }

  /* ============================================================
     ПОИСК
     ============================================================ */
  .search-wrap {
    padding: 4px 6px 0 !important;
  }

  .search-wrap input {
    width: 100%;
    padding: 6px 8px !important;
    border-radius: 4px;
    border: 1.5px solid #E8ECF0;
    font-size: 12px;
    font-family: "Inter", sans-serif;
    background: #F5F7FA;
    color: #1A1A2E;
    transition: all 0.2s ease;
  }

  .search-wrap input:focus {
    outline: none;
    border-color: #FF6A00;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px rgba(255,106,0,0.12);
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 4px 6px 70px !important;
  }

  /* ============================================================
     СТАТЬИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 6px;
  }

  .article-card {
    background: #FFFFFF;
    border: 1.5px solid #E8ECF0;
    border-radius: 6px;
    padding: 6px 6px !important;
    cursor: pointer;
    transition: all 0.2s ease;
    width: 100%;
  }

  .article-card:active {
    transform: scale(0.98);
  }

  .article-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 4px;
    width: 100%;
  }

  .article-head h3 {
    font-family: "Unbounded", sans-serif;
    font-weight: 600;
    font-size: clamp(0.7rem, 2.8vw, 0.85rem);
    margin: 0 !important;
    color: #1A1A2E;
    word-break: break-word;
    flex: 1;
  }

  .article-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .btn-sm {
    padding: 1px 4px !important;
    border: 1.5px solid #E8ECF0;
    border-radius: 4px;
    background: transparent;
    font-size: 9px;
    font-weight: 500;
    color: #5A5A6E;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: "Inter", sans-serif;
    min-height: 18px;
    line-height: 1;
  }

  .btn-sm.edit:hover {
    border-color: #FF6A00;
    color: #FF6A00;
    background: #FFF0E6;
  }

  .btn-sm.delete:hover {
    border-color: #DC3545;
    color: #DC3545;
    background: #FDEDEB;
  }

  .btn-sm.hidden {
    display: none;
  }

  .article-desc {
    color: #5A5A6E;
    font-size: clamp(0.7rem, 2vw, 0.8rem);
    margin: 2px 0 !important;
    line-height: 1.4;
  }

  .article-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    font-size: 9px;
    color: #9A9AAE;
  }

  .article-meta span {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  /* ============================================================
     РАЗВОРАЧИВАНИЕ
     ============================================================ */
  .btn-expand {
    background: none;
    border: none;
    color: #FF6A00;
    font-weight: 600;
    font-size: 10px;
    cursor: pointer;
    padding: 4px 2px 0 !important;
    width: 100%;
    text-align: left;
    font-family: "Inter", sans-serif;
  }

  .btn-expand:hover {
    color: #E85D00;
  }

  /* ============================================================
     ТЕЛО СТАТЬИ
     ============================================================ */
  .article-body {
    margin-top: 6px !important;
    padding-top: 6px !important;
    border-top: 1px solid #E8ECF0;
    display: none;
    font-size: 11px;
    line-height: 1.5;
    color: #5A5A6E;
    width: 100%;
  }

  .article-body.open {
    display: block;
  }

  .article-body ul {
    list-style: none;
    margin: 0 !important;
    padding: 0 !important;
  }

  .article-body ul li {
    padding-left: 16px !important;
    position: relative;
    margin-bottom: 2px !important;
    line-height: 1.5;
  }

  .article-body ul li::before {
    content: "•";
    color: #FF6A00;
    position: absolute;
    left: 2px;
    top: 0;
  }

  .article-body .script {
    background: #FFF0E6;
    padding: 4px 8px !important;
    border-radius: 4px;
    margin: 3px 0 !important;
    border-left: 3px solid #FF6A00;
    color: #1A1A2E;
    font-size: 11px;
  }

  .article-body .note {
    background: #F0F7FF;
    padding: 4px 8px !important;
    border-radius: 4px;
    margin: 3px 0 !important;
    border: 1px solid #E0EDF5;
    font-size: 11px;
  }

  .article-body .danger {
    background: #FDEDEB;
    padding: 4px 8px !important;
    border-radius: 4px;
    margin: 3px 0 !important;
    border-left: 3px solid #DC3545;
    font-size: 11px;
  }

  .article-body .danger .lbl {
    font-weight: 700;
    color: #DC3545;
  }

  .article-body .table-wrap {
    overflow-x: auto;
    margin: 3px 0 !important;
  }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
    min-width: 180px;
  }

  .article-body table th {
    border-bottom: 2px solid #FF6A00;
    padding: 3px 3px !important;
    text-align: left;
    color: #E85D00;
    font-weight: 600;
  }

  .article-body table td {
    border-bottom: 1px solid #E8ECF0;
    padding: 3px 3px !important;
    vertical-align: top;
  }

  .article-body .badge {
    display: inline-block;
    background: #FF6A00;
    color: #fff;
    padding: 1px 8px !important;
    border-radius: 30px;
    font-size: 8px;
    font-weight: 600;
    margin-bottom: 2px !important;
  }

  .article-body .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin: 3px 0 !important;
  }

  .article-body .flex-grid .item {
    background: #F5F7FA;
    padding: 6px 8px !important;
    border-radius: 4px;
    border: 1px solid #E8ECF0;
  }

  .article-body .flex-grid .item .ttl {
    font-weight: 700;
    color: #E85D00;
    margin-bottom: 1px !important;
  }

  .article-body .flex-grid .item p {
    margin: 0 !important;
    font-size: 11px;
    color: #5A5A6E;
  }

  .article-body .footer {
    margin-top: 6px !important;
    padding: 6px 10px !important;
    background: #FFF0E6;
    border-radius: 4px;
    text-align: center;
    font-weight: 700;
    color: #E85D00;
    font-size: 11px;
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty {
    text-align: center;
    padding: 20px 6px !important;
    color: #9A9AAE;
  }

  .empty .icon {
    font-size: 24px;
    opacity: 0.4;
  }

  /* ============================================================
     FLOATING ACTION BUTTON
     ============================================================ */
  .fab {
    position: fixed;
    bottom: 12px;
    right: 10px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #FF6A00;
    color: #fff;
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,106,0,0.35);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .fab:active {
    transform: scale(0.92);
  }

  .fab.hidden {
    display: none;
  }

  .fab.show {
    animation: fabIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes fabIn {
    from { opacity: 0; transform: scale(0.6) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ============================================================
     МОДАЛКИ
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 12px !important;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-box {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 16px 14px !important;
    max-width: 680px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.15);
    border: 1px solid #E8ECF0;
  }

  .modal-box h2 {
    font-family: "Unbounded", sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 2px !important;
    color: #1A1A2E;
  }

  .modal-box .sub {
    color: #5A5A6E;
    font-size: 11px;
    margin: 0 0 10px !important;
  }

  .modal-box .field {
    margin-bottom: 6px !important;
  }

  .modal-box .field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: #5A5A6E;
    margin-bottom: 2px !important;
  }

  .modal-box .field input,
  .modal-box .field textarea,
  .modal-box .field select {
    width: 100%;
    padding: 6px 8px !important;
    border-radius: 4px;
    border: 1.5px solid #E8ECF0;
    font-size: 12px;
    font-family: "Inter", sans-serif;
    background: #F5F7FA;
    transition: all 0.2s ease;
    color: #1A1A2E;
  }

  .modal-box .field textarea {
    min-height: 60px;
    resize: vertical;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
  }

  .modal-box .field input:focus,
  .modal-box .field textarea:focus,
  .modal-box .field select:focus {
    outline: none;
    border-color: #FF6A00;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px rgba(255,106,0,0.12);
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 10px !important;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 6px !important;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    font-family: "Inter", sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .modal-actions .btn-primary {
    background: #FF6A00;
    color: #fff;
  }

  .modal-actions .btn-secondary {
    background: #F5F7FA;
    color: #5A5A6E;
    border: 1.5px solid #E8ECF0;
  }

  .modal-actions .btn-danger {
    background: #DC3545;
    color: #fff;
  }

  .hint {
    font-size: 9px;
    color: #9A9AAE;
    margin-top: 2px !important;
    background: #F5F7FA;
    padding: 3px 6px !important;
    border-radius: 4px;
    border: 1px solid #E8ECF0;
  }

  .hint code {
    background: #FFFFFF;
    padding: 1px 4px !important;
    border-radius: 3px;
    font-size: 8px;
    color: #E85D00;
    font-family: "JetBrains Mono", monospace;
    border: 1px solid #E8ECF0;
  }

  /* ============================================================
     АДАПТИВНОСТЬ
     ============================================================ */

  /* ДЕСКТОП — ОГРАНИЧЕНИЕ */
  @media (min-width: 600px) {
    .page-wrap {
      max-width: 600px !important;
      margin: 0 auto !important;
    }

    .card {
      border-radius: 12px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important;
      border: 1px solid #E8ECF0 !important;
      margin: 12px auto !important;
    }

    .header {
      padding: 10px 14px !important;
    }

    .content {
      padding: 10px 14px 80px !important;
    }

    .search-wrap {
      padding: 10px 14px 0 !important;
    }

    .article-card {
      padding: 12px 14px !important;
    }

    .fab {
      width: 52px;
      height: 52px;
      font-size: 26px;
      bottom: 24px;
      right: 24px;
    }
  }

  /* SAFE AREA */
  @supports (padding: max(0px)) {
    .fab {
      bottom: max(12px, env(safe-area-inset-bottom));
      right: max(10px, env(safe-area-inset-right));
    }
  }

  @media (min-width: 600px) {
    @supports (padding: max(0px)) {
      .fab {
        bottom: max(24px, env(safe-area-inset-bottom));
        right: max(24px, env(safe-area-inset-right));
      }
    }
  }

  /* СКРОЛЛ */
  ::-webkit-scrollbar {
    width: 3px;
    height: 3px;
  }
  ::-webkit-scrollbar-track {
    background: #F5F7FA;
  }
  ::-webkit-scrollbar-thumb {
    background: #E8ECF0;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="card">

    <!-- ШАПКА -->
    <div class="header">
      <div class="header-left">
        <span class="header-icon">📚</span>
        <h1>Материалы для УСМ</h1>
      </div>
      <div class="header-actions">

        <div class="dropdown" id="roleDropdown">
          <button class="dropdown-btn" id="dropdownBtn">
            ⚡ УСМ <span class="arrow">▼</span>
          </button>
          <div class="dropdown-menu" id="dropdownMenu">
            <a href="#" data-role="usm" class="active">
              ⚡ УСМ <span class="check">✓</span>
            </a>
            <a href="#" data-role="sklad">📦 Кладовщик</a>
            <a href="#" data-role="pk">🛍️ Продавец</a>
          </div>
        </div>

      </div>
    </div>

    <!-- ПОИСК -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
    </div>

    <!-- КОНТЕНТ -->
    <div class="content">
      <div id="articlesContainer" class="articles-grid">
        <div class="empty">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- FAB -->
<button class="fab hidden" id="addArticleBtn" aria-label="Добавить статью">+</button>

<!-- МОДАЛКИ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги</p>
    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">
      <div class="field">
        <label for="editArticleTitle">Название *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>
      <div class="field">
        <label for="editArticleDescription">Описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>
      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст с HTML-форматированием..."></textarea>
        <div class="hint">💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code></div>
      </div>
      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600;color:#E85D00;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- СКРИПТ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  updateDoc, deleteDoc, doc, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL, POSITION_PAGES } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

const container = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addBtn = document.getElementById('addArticleBtn');

const dropdownBtn = document.getElementById('dropdownBtn');
const dropdownMenu = document.getElementById('dropdownMenu');

const editModal = document.getElementById('editModal');
const editTitle = document.getElementById('editModalTitle');
const editForm = document.getElementById('editArticleForm');
const editId = document.getElementById('editArticleId');
const editName = document.getElementById('editArticleTitle');
const editDesc = document.getElementById('editArticleDescription');
const editContent = document.getElementById('editArticleContent');
const editCat = document.getElementById('editArticleCategory');
const cancelEdit = document.getElementById('cancelEditBtn');
const saveBtn = document.getElementById('saveArticleBtn');

const deleteModal = document.getElementById('deleteModal');
const deleteTitle = document.getElementById('deleteArticleTitle');
const cancelDelete = document.getElementById('cancelDeleteBtn');
const confirmDelete = document.getElementById('confirmDeleteBtn');

// ВЫПАДАЮЩИЙ СПИСОК
dropdownBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.classList.toggle('open');
  dropdownBtn.classList.toggle('open');
});

document.addEventListener('click', () => {
  dropdownMenu.classList.remove('open');
  dropdownBtn.classList.remove('open');
});

dropdownMenu.querySelectorAll('a').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    const role = item.dataset.role;
    const label = item.textContent.trim().replace('✓', '').trim();
    dropdownBtn.innerHTML = `${label} <span class="arrow">▼</span>`;
    dropdownMenu.querySelectorAll('a').forEach(a => a.classList.remove('active'));
    item.classList.add('active');
    dropdownMenu.classList.remove('open');
    dropdownBtn.classList.remove('open');
    window.location.href = POSITION_PAGES[role].page;
  });
});

// ЗАГРУЗКА
async function loadArticles() {
  try {
    const q = query(collection(db, "articles"), where("role", "==", ROLE), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allArticles = [];
    snap.forEach(d => allArticles.push({ id: d.id, ...d.data() }));
    render(allArticles);
  } catch (e) {
    container.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Ошибка загрузки</p></div>`;
  }
}

// ОТОБРАЖЕНИЕ
function render(articles) {
  if (!articles || !articles.length) {
    container.innerHTML = `<div class="empty"><div class="icon">📖</div><p>Пока нет статей</p>${isAdmin ? '<p style="font-size:10px;">Нажмите ➕</p>' : ''}</div>`;
    return;
  }

  container.innerHTML = articles.map(a => `
    <div class="article-card" data-id="${a.id}">
      <div class="article-head">
        <h3>${a.title || 'Без названия'}</h3>
        <div class="article-actions">
          <button class="btn-sm edit ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">✏️</button>
          <button class="btn-sm delete ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">🗑️</button>
        </div>
      </div>
      ${a.description ? `<div class="article-desc">${a.description}</div>` : ''}
      <div class="article-meta">
        <span>📅 ${formatDate(a.createdAt)}</span>
        ${a.category ? `<span>🏷️ ${a.category}</span>` : ''}
        ${a.authorEmail ? `<span>✉️ ${a.authorEmail}</span>` : ''}
      </div>
      <div class="article-body" id="body-${a.id}">${a.content || '<p>Содержание не добавлено</p>'}</div>
      <button class="btn-expand" data-id="${a.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  document.querySelectorAll('.btn-expand').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = b.dataset.id;
      const body = document.getElementById(`body-${id}`);
      if (body) {
        body.classList.toggle('open');
        b.textContent = body.classList.contains('open') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  document.querySelectorAll('.edit').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openEdit(a);
    });
  });

  document.querySelectorAll('.delete').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openDelete(a);
    });
  });
}

function formatDate(ts) {
  if (!ts) return 'Неизвестно';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return 'Неизвестно'; }
}

// ПОИСК
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { render(allArticles); return; }
  render(allArticles.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.description || '').toLowerCase().includes(q) ||
    (a.content || '').toLowerCase().includes(q)
  ));
});

// МОДАЛКИ
function openEdit(a = null) {
  if (a) {
    editTitle.textContent = '✏️ Редактировать';
    editId.value = a.id;
    editName.value = a.title || '';
    editDesc.value = a.description || '';
    editContent.value = a.content || '';
    editCat.value = a.category || 'general';
    saveBtn.textContent = 'Обновить';
    editingId = a.id;
  } else {
    editTitle.textContent = '➕ Новая статья';
    editId.value = '';
    editName.value = '';
    editDesc.value = '';
    editContent.value = '';
    editCat.value = 'general';
    saveBtn.textContent = 'Добавить';
    editingId = null;
  }
  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function openDelete(a) {
  deletingId = a.id;
  deleteTitle.textContent = `"${a.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editForm.reset();
}

function closeDelete() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEdit.addEventListener('click', closeEdit);
cancelDelete.addEventListener('click', closeDelete);
editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });
deleteModal.addEventListener('click', e => { if (e.target === deleteModal) closeDelete(); });

// СОХРАНЕНИЕ
editForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = editName.value.trim();
  const desc = editDesc.value.trim();
  const content = editContent.value.trim();
  const cat = editCat.value;
  if (!title || !content) { alert('Заполните название и содержание'); return; }
  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), { title, description: desc, content, category: cat, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'articles'), { title, description: desc, content, category: cat, role: ROLE, authorUid: currentUser?.uid, authorEmail: currentUser?.email, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEdit();
    await loadArticles();
  } catch (e) {
    alert('Ошибка сохранения');
  }
});

// УДАЛЕНИЕ
confirmDelete.addEventListener('click', async () => {
  if (!deletingId) return;
  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDelete();
    await loadArticles();
  } catch (e) {
    alert('Ошибка удаления');
  }
});

// FAB
addBtn.addEventListener('click', () => openEdit(null));

function updateFab() {
  if (isAdmin) {
    addBtn.classList.remove('hidden');
    setTimeout(() => addBtn.classList.add('show'), 100);
  } else {
    addBtn.classList.add('hidden');
    addBtn.classList.remove('show');
  }
}

// АВТОРИЗАЦИЯ
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    updateFab();
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEdit();
    if (deleteModal.classList.contains('active')) closeDelete();
  }
});
</script>

</body>
</html>
