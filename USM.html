<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Подключаем трекер сессий -->
<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     БАЗОВЫЕ СТИЛИ
     ============================================================ */
  * {
    -webkit-tap-highlight-color: transparent;
  }

  .page-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 12px;
  }

  .card-main {
    max-width: 1300px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  /* ============================================================
     ШАПКА (АДАПТИВНАЯ)
     ============================================================ */
  .header {
    background: #d95b00;
    padding: 16px 20px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-icon {
    font-size: 2.2rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .header h1 {
    margin: 0;
    font-size: clamp(1rem, 4vw, 1.6rem);
    font-weight: 700;
    flex: 1;
    min-width: 120px;
    word-break: break-word;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    width: 100%;
    margin-top: 8px;
  }

  .header-actions .btn-back,
  .header-actions .btn-add-article {
    flex: 1;
    justify-content: center;
    text-align: center;
    min-width: 80px;
  }

  .btn-add-article {
    padding: 10px 16px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.25);
    color: white;
    font-weight: 600;
    font-size: clamp(12px, 2.5vw, 14px);
    cursor: pointer;
    transition: all 0.15s ease;
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-add-article:hover {
    background: rgba(255,255,255,0.4);
  }

  .btn-add-article.hidden {
    display: none;
  }

  .btn-back {
    padding: 10px 16px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    background: transparent;
    color: white;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: clamp(12px, 2.5vw, 14px);
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .btn-back:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 16px 14px;
  }

  /* ============================================================
     ПОИСК
     ============================================================ */
  .search-wrap {
    margin-bottom: 16px;
  }

  .search-wrap input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1.5px solid #e8e8e8;
    font-size: clamp(14px, 3vw, 16px);
    font-family: var(--font-body);
    background: #f8f8f8;
    transition: border-color 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .search-wrap input:focus {
    outline: none;
    border-color: #d95b00;
    background: white;
  }

  /* ============================================================
     СТАТЬИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 16px;
  }

  .article-card {
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #e8e8e8;
    padding: 16px;
    transition: all 0.2s ease;
    cursor: pointer;
    -webkit-touch-callout: none;
  }

  .article-card:active {
    transform: scale(0.99);
  }

  .article-card-header {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }

  .article-card h3 {
    font-family: var(--font-display);
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    font-weight: 700;
    color: #d95b00;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 3px solid #d95b00;
    padding-left: 12px;
    word-break: break-word;
  }

  .article-card .article-description {
    color: #4a5568;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    margin: 6px 0 10px;
    line-height: 1.5;
    word-break: break-word;
  }

  .article-card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: clamp(0.7rem, 2vw, 0.8rem);
    color: #a0aec0;
  }

  .article-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Админ-кнопки на карточке */
  .admin-actions-on-card {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-edit,
  .btn-delete {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    font-size: clamp(11px, 2vw, 12px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    flex: 1;
    min-width: 60px;
    text-align: center;
  }

  .btn-edit {
    background: #eef4fa;
    color: #2c5a7a;
  }

  .btn-edit:active {
    transform: scale(0.95);
  }

  .btn-delete {
    background: #fff6f0;
    color: #b91c1c;
  }

  .btn-delete:active {
    transform: scale(0.95);
  }

  .btn-edit.hidden,
  .btn-delete.hidden {
    display: none;
  }

  /* Кнопка "Читать полностью" */
  .btn-toggle-content {
    background: none;
    border: none;
    color: #d95b00;
    font-weight: 600;
    cursor: pointer;
    font-size: clamp(0.8rem, 2vw, 0.85rem);
    padding: 8px 4px;
    width: 100%;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-toggle-content:active {
    opacity: 0.6;
  }

  /* ============================================================
     СОДЕРЖИМОЕ СТАТЬИ (АДАПТИВНОЕ)
     ============================================================ */
  .article-content {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e8e8e8;
    display: none;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .article-content.expanded {
    display: block;
  }

  .article-content .two-columns {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 12px 0;
  }

  .article-content .two-columns > div {
    flex: 1;
    background: #fafafa;
    border-radius: 14px;
    padding: 14px 16px;
    min-width: 0;
    overflow: hidden;
  }

  .article-content .panel-title {
    font-weight: 700;
    color: #d95b00;
    margin-bottom: 10px;
    font-size: clamp(0.9rem, 2.8vw, 1rem);
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 4px solid #d95b00;
    padding-left: 12px;
  }

  .article-content .step-list {
    list-style: none;
    padding: 0;
    margin: 0 0 12px 0;
  }

  .article-content .step-list li {
    margin-bottom: 10px;
    padding-left: 22px;
    position: relative;
    line-height: 1.5;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
    word-break: break-word;
  }

  .article-content .step-list li::before {
    content: "●";
    color: #d95b00;
    font-weight: bold;
    position: absolute;
    left: 4px;
    font-size: clamp(12px, 2.5vw, 14px);
    top: 2px;
  }

  .article-content .script {
    background: #fffaf5;
    border-left: 3px solid #d95b00;
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 12px;
    font-weight: 500;
    color: #1e4663;
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    word-break: break-word;
  }

  .article-content .important-note {
    background: #eef4fa;
    padding: 10px 14px;
    border-radius: 14px;
    margin-top: 10px;
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    border: 1px solid #e2eaf1;
    word-break: break-word;
  }

  .article-content .forbidden {
    background: #fff6f0;
    border-left: 4px solid #dc2626;
    padding: 10px 14px;
    border-radius: 14px;
    margin-top: 10px;
    word-break: break-word;
  }

  .article-content .forbidden p {
    font-weight: 700;
    color: #b91c1c;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: clamp(0.82rem, 2.3vw, 0.92rem);
  }

  .article-content .forbidden span {
    font-size: clamp(0.78rem, 2.2vw, 0.88rem);
  }

  .article-content .kpi-badge {
    background: #ffeed9;
    color: #d95b00;
    border-radius: 30px;
    padding: 3px 12px;
    font-size: clamp(0.6rem, 1.8vw, 0.7rem);
    font-weight: 600;
    display: inline-block;
    margin-bottom: 8px;
  }

  .article-content .table-mini {
    margin-top: 10px;
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(0.72rem, 2vw, 0.82rem);
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .article-content .table-mini td,
  .article-content .table-mini th {
    border-bottom: 1px solid #e2e8f0;
    padding: 8px 6px;
    vertical-align: top;
    text-align: left;
    word-break: break-word;
    min-width: 60px;
  }

  .article-content .table-mini th {
    font-weight: 700;
    color: #d95b00;
    min-width: 70px;
  }

  /* Адаптивные карточки внутри статьи */
  .article-content .flex-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 12px 0;
  }

  .article-content .flex-card {
    flex: 1;
    background: #fffaf5;
    border-radius: 16px;
    padding: 14px 16px;
    border: 1px solid #f0e0d0;
    min-width: 0;
  }

  .article-content .flex-card .card-title {
    font-weight: 700;
    color: #d95b00;
    margin-bottom: 8px;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
  }

  .article-content .flex-card p {
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
    line-height: 1.5;
    margin: 0;
    word-break: break-word;
  }

  .article-content .footer-note {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f1f5f9;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    text-align: center;
  }

  .article-content .footer-note .footer-text {
    font-weight: 700;
    color: #d95b00;
    font-size: clamp(0.9rem, 2.8vw, 1.1rem);
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #a0aec0;
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 10px;
  }

  .empty-state p {
    margin: 4px 0;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem);
  }

  /* ============================================================
     МОДАЛКИ (АДАПТИВНЫЕ)
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 12px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px 20px;
    max-width: 700px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-content h2 {
    font-family: var(--font-display);
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    margin: 0 0 4px;
  }

  .modal-content .sub {
    color: var(--ink-soft);
    margin: 0 0 16px;
    font-size: clamp(0.8rem, 2.2vw, 0.9rem);
  }

  .modal-content .field {
    margin-bottom: 14px;
  }

  .modal-content .field label {
    display: block;
    font-size: clamp(0.8rem, 2.2vw, 0.85rem);
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 4px;
  }

  .modal-content .field input,
  .modal-content .field textarea,
  .modal-content .field select {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid #e8e8e8;
    font-size: clamp(14px, 3vw, 16px);
    font-family: var(--font-body);
    background: #fafafa;
    transition: border-color 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .modal-content .field textarea {
    min-height: 120px;
    resize: vertical;
    font-family: 'Courier New', monospace;
    font-size: clamp(12px, 2.5vw, 13px);
    line-height: 1.6;
  }

  .modal-content .field input:focus,
  .modal-content .field textarea:focus,
  .modal-content .field select:focus {
    outline: none;
    border-color: #d95b00;
    background: white;
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: clamp(14px, 3vw, 16px);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .modal-actions .btn-primary {
    background: #d95b00;
    color: #fff;
  }

  .modal-actions .btn-primary:active {
    transform: scale(0.97);
  }

  .modal-actions .btn-cancel {
    background: #f1f5f9;
    color: #4a5568;
    border: 1.5px solid #e8e8e8;
  }

  .modal-actions .btn-cancel:active {
    transform: scale(0.97);
  }

  .modal-actions .btn-danger {
    background: #dc2626;
    color: #fff;
  }

  .modal-actions .btn-danger:active {
    transform: scale(0.97);
  }

  .formatting-hint {
    font-size: clamp(11px, 2vw, 12px);
    color: #a0aec0;
    margin-top: 4px;
    background: #f8fafc;
    padding: 8px 12px;
    border-radius: 8px;
    word-break: break-word;
  }

  .formatting-hint code {
    background: #e2e8f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: clamp(10px, 1.8vw, 11px);
    display: inline-block;
    margin: 2px 0;
  }

  /* ============================================================
     ПЛАНШЕТЫ (768px+)
     ============================================================ */
  @media (min-width: 768px) {
    .page-wrap {
      padding: 20px;
    }

    .content {
      padding: 24px 28px;
    }

    .header {
      padding: 20px 28px;
    }

    .header-actions {
      width: auto;
      margin-top: 0;
    }

    .header-actions .btn-back,
    .header-actions .btn-add-article {
      flex: none;
    }

    .article-card {
      padding: 20px 24px;
    }

    .article-card-header {
      flex-direction: row;
      align-items: flex-start;
    }

    .admin-actions-on-card {
      flex: none;
    }

    .btn-edit,
    .btn-delete {
      flex: none;
    }

    .article-content .two-columns {
      flex-direction: row;
    }

    .article-content .flex-cards {
      flex-direction: row;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-content {
      padding: 32px;
    }
  }

  /* ============================================================
     ДЕСКТОП (1024px+)
     ============================================================ */
  @media (min-width: 1024px) {
    .page-wrap {
      padding: 30px 24px;
    }

    .content {
      padding: 28px 32px;
    }

    .articles-grid {
      gap: 20px;
    }

    .article-card {
      padding: 24px 28px;
    }

    .article-content .two-columns {
      gap: 20px;
    }

    .article-content .two-columns > div {
      padding: 18px 22px;
    }

    .article-content .flex-cards {
      gap: 20px;
    }
  }

  /* ============================================================
     САМЫЕ МАЛЕНЬКИЕ ЭКРАНЫ (320px-)
     ============================================================ */
  @media (max-width: 360px) {
    .header-icon {
      font-size: 1.8rem;
    }

    .header h1 {
      font-size: 0.95rem;
    }

    .btn-add-article,
    .btn-back {
      font-size: 11px;
      padding: 8px 12px;
    }

    .article-card {
      padding: 12px;
    }

    .article-card h3 {
      font-size: 0.9rem;
    }

    .modal-content {
      padding: 16px;
    }

    .article-content .two-columns > div {
      padding: 10px 12px;
    }
  }

  /* ============================================================
     БЕЗОПАСНАЯ ЗОНА ДЛЯ iPhone (notch)
     ============================================================ */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 768px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
        padding-top: max(20px, env(safe-area-inset-top));
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }
  }

  /* ============================================================
     ЗАПРЕТ УВЕЛИЧЕНИЯ ПРИ ДВОЙНОМ ТАПЕ (iOS)
     ============================================================ */
  .article-card,
  .btn,
  .btn-add-article,
  .btn-back,
  .btn-toggle-content {
    touch-action: manipulation;
  }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="card-main">
    <!-- Шапка -->
    <div class="header">
      <div class="header-icon">📚</div>
      <h1>Материалы для УСМ</h1>
      <div class="header-actions">
        <a href="index.html" class="btn-back">← Назад</a>
        <button class="btn-add-article hidden" id="addArticleBtn">➕ Добавить</button>
      </div>
    </div>

    <div class="content">
      <!-- Поиск -->
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
      </div>

      <!-- Список статей -->
      <div id="articlesContainer" class="articles-grid">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ СТАТЬИ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>

    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">

      <div class="field">
        <label for="editArticleTitle">Название статьи *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>

      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>

      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст статьи с HTML-форматированием..."></textarea>
        <div class="formatting-hint">
          💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code>
        </div>
      </div>

      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА ПОДТВЕРЖДЕНИЯ УДАЛЕНИЯ
     ============================================================ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-content">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color:#d95b00; word-break:break-word;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-cancel" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

// DOM элементы
const articlesContainer = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addArticleBtn = document.getElementById('addArticleBtn');

// Модалка редактирования
const editModal = document.getElementById('editModal');
const editModalTitle = document.getElementById('editModalTitle');
const editArticleForm = document.getElementById('editArticleForm');
const editArticleId = document.getElementById('editArticleId');
const editArticleTitle = document.getElementById('editArticleTitle');
const editArticleDescription = document.getElementById('editArticleDescription');
const editArticleContent = document.getElementById('editArticleContent');
const editArticleCategory = document.getElementById('editArticleCategory');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const saveArticleBtn = document.getElementById('saveArticleBtn');

// Модалка удаления
const deleteModal = document.getElementById('deleteModal');
const deleteArticleTitle = document.getElementById('deleteArticleTitle');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

// ============================================================
// ЗАГРУЗКА СТАТЕЙ
// ============================================================
async function loadArticles() {
  try {
    const q = query(
      collection(db, "articles"),
      where("role", "==", ROLE),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);
    allArticles = [];

    snapshot.forEach(doc => {
      allArticles.push({
        id: doc.id,
        ...doc.data()
      });
    });

    renderArticles(allArticles);
  } catch (error) {
    console.error("Ошибка загрузки статей:", error);
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Не удалось загрузить статьи</p>
        <p style="font-size:13px; color: #dc2626;">${error.message}</p>
      </div>
    `;
  }
}

// ============================================================
// ОТОБРАЖЕНИЕ СТАТЕЙ
// ============================================================
function renderArticles(articles) {
  if (!articles || articles.length === 0) {
    articlesContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Пока нет статей для этой должности</p>
        ${isAdmin ? '<p style="font-size:13px;">Нажмите "Добавить" чтобы создать первую</p>' : ''}
      </div>
    `;
    return;
  }

  articlesContainer.innerHTML = articles.map(article => `
    <div class="article-card" data-id="${article.id}">
      <div class="article-card-header">
        <h3>${article.title || 'Без названия'}</h3>
        <div class="admin-actions-on-card">
          <button class="btn-edit ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">✏️</button>
          <button class="btn-delete ${isAdmin ? '' : 'hidden'}" data-id="${article.id}">🗑️</button>
        </div>
      </div>

      ${article.description ? `<p class="article-description">${article.description}</p>` : ''}

      <div class="meta">
        <span>📅 ${formatDate(article.createdAt)}</span>
        ${article.category ? `<span>🏷️ ${article.category}</span>` : ''}
        ${article.authorEmail ? `<span>✍️ ${article.authorEmail}</span>` : ''}
      </div>

      <div class="article-content" id="content-${article.id}">
        ${article.content || '<p>Содержание не добавлено</p>'}
      </div>

      <button class="btn-toggle-content" data-id="${article.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  // Клик по кнопке "Читать полностью"
  document.querySelectorAll('.btn-toggle-content').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const content = document.getElementById(`content-${id}`);
      if (content) {
        content.classList.toggle('expanded');
        btn.textContent = content.classList.contains('expanded') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  // Кнопки редактирования
  document.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const article = allArticles.find(a => a.id === id);
      if (article) openEditModal(article);
    });
  });

  // Кнопки удаления
  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const article = allArticles.find(a => a.id === id);
      if (article) openDeleteModal(article);
    });
  });
}

// ============================================================
// ФОРМАТИРОВАНИЕ ДАТЫ
// ============================================================
function formatDate(timestamp) {
  if (!timestamp) return 'Неизвестно';
  try {
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('ru-RU', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  } catch {
    return 'Неизвестно';
  }
}

// ============================================================
// ПОИСК
// ============================================================
searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  if (!query) {
    renderArticles(allArticles);
    return;
  }

  const filtered = allArticles.filter(article => {
    const title = (article.title || '').toLowerCase();
    const desc = (article.description || '').toLowerCase();
    const content = (article.content || '').toLowerCase();
    return title.includes(query) || desc.includes(query) || content.includes(query);
  });

  renderArticles(filtered);
});

// ============================================================
// ОТКРЫТИЕ МОДАЛКИ РЕДАКТИРОВАНИЯ
// ============================================================
function openEditModal(article = null) {
  if (article) {
    editModalTitle.textContent = '✏️ Редактировать';
    editArticleId.value = article.id;
    editArticleTitle.value = article.title || '';
    editArticleDescription.value = article.description || '';
    editArticleContent.value = article.content || '';
    editArticleCategory.value = article.category || 'general';
    saveArticleBtn.textContent = 'Обновить';
    editingId = article.id;
  } else {
    editModalTitle.textContent = '➕ Новая статья';
    editArticleId.value = '';
    editArticleTitle.value = '';
    editArticleDescription.value = '';
    editArticleContent.value = '';
    editArticleCategory.value = 'general';
    saveArticleBtn.textContent = 'Добавить';
    editingId = null;
  }

  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ============================================================
// ОТКРЫТИЕ МОДАЛКИ УДАЛЕНИЯ
// ============================================================
function openDeleteModal(article) {
  deletingId = article.id;
  deleteArticleTitle.textContent = `"${article.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ============================================================
// ЗАКРЫТИЕ МОДАЛОК
// ============================================================
function closeEditModal() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editArticleForm.reset();
}

function closeDeleteModal() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEditBtn.addEventListener('click', closeEditModal);
cancelDeleteBtn.addEventListener('click', closeDeleteModal);

editModal.addEventListener('click', (e) => {
  if (e.target === editModal) closeEditModal();
});

deleteModal.addEventListener('click', (e) => {
  if (e.target === deleteModal) closeDeleteModal();
});

// ============================================================
// СОХРАНЕНИЕ СТАТЬИ
// ============================================================
editArticleForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const title = editArticleTitle.value.trim();
  const description = editArticleDescription.value.trim();
  const content = editArticleContent.value.trim();
  const category = editArticleCategory.value;

  if (!title || !content) {
    alert('Заполните название и содержание статьи');
    return;
  }

  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), {
        title,
        description,
        content,
        category,
        updatedAt: serverTimestamp()
      });
    } else {
      await addDoc(collection(db, 'articles'), {
        title,
        description,
        content,
        category,
        role: ROLE,
        authorUid: currentUser?.uid || null,
        authorEmail: currentUser?.email || null,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    closeEditModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка сохранения статьи:', error);
    alert('Не удалось сохранить статью. Попробуйте еще раз.');
  }
});

// ============================================================
// УДАЛЕНИЕ СТАТЬИ
// ============================================================
confirmDeleteBtn.addEventListener('click', async () => {
  if (!deletingId) return;

  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDeleteModal();
    await loadArticles();
  } catch (error) {
    console.error('Ошибка удаления статьи:', error);
    alert('Не удалось удалить статью. Попробуйте еще раз.');
  }
});

// ============================================================
// ДОБАВЛЕНИЕ СТАТЬИ
// ============================================================
addArticleBtn.addEventListener('click', () => {
  openEditModal(null);
});

// ============================================================
// ПРОВЕРКА АВТОРИЗАЦИИ
// ============================================================
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    if (isAdmin) {
      addArticleBtn.classList.remove('hidden');
    }
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

// Закрытие модалок по Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEditModal();
    if (deleteModal.classList.contains('active')) closeDeleteModal();
  }
});
</script>

</body>
</html>
