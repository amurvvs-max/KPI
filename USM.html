<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>KPI Guide — УСМ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module" src="session-tracker.js"></script>

<style>
  /* ============================================================
     ПЕРЕМЕННЫЕ
     ============================================================ */
  :root {
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --surface-hover: #FAFBFC;
    --ink: #1A1A2E;
    --ink-soft: #5A5A6E;
    --ink-muted: #9A9AAE;
    --orange: #FF6A00;
    --orange-deep: #E85D00;
    --orange-light: #FFF0E6;
    --orange-glow: rgba(255, 106, 0, 0.12);
    --line: #E8ECF0;
    --red: #DC3545;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --font-display: "Unbounded", sans-serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  /* ============================================================
     ГЛОБАЛЬНЫЕ СТИЛИ
     ============================================================ */
  * {
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     ГРАДИЕНТНЫЙ ФОН
     ============================================================ */
  body {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,106,0,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(255,106,0,0.03) 0%, transparent 50%),
      var(--bg);
  }

  /* ============================================================
     ОБЕРТКА
     ============================================================ */
  .page-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ============================================================
     ГЛАВНАЯ КАРТОЧКА
     ============================================================ */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    overflow: hidden;
    transition: box-shadow 0.3s ease;
  }

  .card:hover {
    box-shadow: var(--shadow-md);
  }

  /* ============================================================
     ШАПКА — СВЕТЛАЯ
     ============================================================ */
  .header {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 160px;
  }

  .header-icon {
    font-size: 1.8rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: 600;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ============================================================
     КНОПКИ
     ============================================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn-back {
    background: var(--bg);
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }

  .btn-back:hover {
    background: var(--line);
    color: var(--ink);
  }

  .btn-add {
    background: var(--orange);
    color: #fff;
    box-shadow: 0 2px 12px rgba(255,106,0,0.25);
  }

  .btn-add:hover {
    background: var(--orange-deep);
    box-shadow: 0 4px 20px rgba(255,106,0,0.35);
    transform: translateY(-1px);
  }

  .btn-add.hidden {
    display: none;
  }

  .btn-primary {
    background: var(--orange);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--orange-deep);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
  }

  .btn-secondary:hover {
    background: var(--line);
  }

  .btn-danger {
    background: var(--red);
    color: #fff;
  }

  .btn-danger:hover {
    background: #c0392b;
  }

  .btn-icon-sm {
    padding: 6px 12px;
    font-size: 12px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-body);
  }

  .btn-icon-sm:hover {
    background: var(--bg);
  }

  .btn-icon-sm.edit:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-light);
  }

  .btn-icon-sm.delete:hover {
    border-color: var(--red);
    color: var(--red);
    background: #FDEDEB;
  }

  .btn-icon-sm.hidden {
    display: none;
  }

  /* ============================================================
     ПОИСК
     ============================================================ */
  .search-wrap {
    padding: 16px 20px 0;
  }

  .search-wrap input {
    width: 100%;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--line);
    font-size: 15px;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    transition: all 0.2s ease;
  }

  .search-wrap input::placeholder {
    color: var(--ink-muted);
  }

  .search-wrap input:focus {
    outline: none;
    border-color: var(--orange);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  /* ============================================================
     КОНТЕНТ
     ============================================================ */
  .content {
    padding: 16px 20px 24px;
  }

  /* ============================================================
     СТАТЬИ — КАРТОЧКИ
     ============================================================ */
  .articles-grid {
    display: grid;
    gap: 12px;
  }

  .article-card {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .article-card:hover {
    border-color: var(--orange);
    box-shadow: 0 4px 16px rgba(255,106,0,0.08);
    transform: translateY(-2px);
  }

  .article-card:active {
    transform: scale(0.98);
  }

  .article-card-header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 4px;
  }

  .article-card h3 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(0.95rem, 2.8vw, 1.1rem);
    margin: 0;
    color: var(--ink);
    word-break: break-word;
  }

  .article-card .desc {
    color: var(--ink-soft);
    font-size: clamp(0.82rem, 2.2vw, 0.9rem);
    margin: 2px 0 6px;
    line-height: 1.5;
    word-break: break-word;
  }

  .article-card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 12px;
    color: var(--ink-muted);
  }

  .article-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .article-card .admin-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* Кнопка разворачивания */
  .btn-expand {
    background: none;
    border: none;
    color: var(--orange);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 4px 4px;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    transition: color 0.2s ease;
  }

  .btn-expand:hover {
    color: var(--orange-deep);
  }

  /* ============================================================
     СОДЕРЖИМОЕ СТАТЬИ
     ============================================================ */
  .article-body {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    display: none;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-soft);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .article-body.open {
    display: block;
    animation: fadeSlide 0.25s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Стили для содержимого */
  .article-body ul {
    list-style: none;
    padding: 0;
    margin: 0 0 8px;
  }

  .article-body ul li {
    padding-left: 22px;
    position: relative;
    margin-bottom: 6px;
    line-height: 1.6;
  }

  .article-body ul li::before {
    content: "•";
    color: var(--orange);
    position: absolute;
    left: 2px;
    top: 0;
    font-weight: 700;
  }

  .article-body .script-box {
    background: var(--orange-light);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 6px 0;
    border-left: 3px solid var(--orange);
    color: var(--ink);
  }

  .article-body .note-box {
    background: #F0F7FF;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 6px 0;
    border: 1px solid #E0EDF5;
  }

  .article-body .danger-box {
    background: #FDEDEB;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin: 6px 0;
    border-left: 3px solid var(--red);
  }

  .article-body .danger-box .label {
    font-weight: 700;
    color: var(--red);
  }

  .article-body .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 8px 0;
  }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 260px;
  }

  .article-body table th {
    border-bottom: 2px solid var(--orange);
    padding: 6px 6px;
    text-align: left;
    color: var(--orange-deep);
    font-weight: 600;
  }

  .article-body table td {
    border-bottom: 1px solid var(--line);
    padding: 6px 6px;
    vertical-align: top;
  }

  .article-body .badge-kpi {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    padding: 2px 14px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .article-body .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 8px 0;
  }

  .article-body .flex-grid .item {
    background: var(--bg);
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
  }

  .article-body .flex-grid .item .title {
    font-weight: 700;
    color: var(--orange-deep);
    margin-bottom: 2px;
  }

  .article-body .flex-grid .item p {
    margin: 0;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .article-body .footer-note {
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--orange-light);
    border-radius: var(--radius-sm);
    text-align: center;
    font-weight: 700;
    color: var(--orange-deep);
    border: 1px solid rgba(255,106,0,0.08);
  }

  /* ============================================================
     ПУСТОЕ СОСТОЯНИЕ
     ============================================================ */
  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--ink-muted);
  }

  .empty-state .icon {
    font-size: 36px;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  .empty-state p {
    margin: 2px 0;
  }

  /* ============================================================
     МОДАЛКИ
     ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-box {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px 20px;
    max-width: 680px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-box h2 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
  }

  .modal-box .sub {
    color: var(--ink-soft);
    font-size: 14px;
    margin: 0 0 16px;
  }

  .modal-box .field {
    margin-bottom: 12px;
  }

  .modal-box .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .modal-box .field input,
  .modal-box .field textarea,
  .modal-box .field select {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--line);
    font-size: 14px;
    font-family: var(--font-body);
    background: var(--bg);
    transition: all 0.2s ease;
    color: var(--ink);
  }

  .modal-box .field textarea {
    min-height: 100px;
    resize: vertical;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
  }

  .modal-box .field input:focus,
  .modal-box .field textarea:focus,
  .modal-box .field select:focus {
    outline: none;
    border-color: var(--orange);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--orange-glow);
  }

  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  .modal-actions .btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
  }

  .hint {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
    background: var(--bg);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
  }

  .hint code {
    background: var(--surface);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--orange-deep);
    font-family: var(--font-mono);
    border: 1px solid var(--line);
  }

  /* ============================================================
     АДАПТИВНОСТЬ
     ============================================================ */

  @media (max-width: 480px) {
    .page-wrap {
      padding: 10px 8px 40px;
    }

    .header {
      padding: 12px 14px;
      gap: 8px;
    }

    .header-left {
      gap: 8px;
      min-width: 120px;
    }

    .header-icon {
      font-size: 1.4rem;
    }

    .header h1 {
      font-size: clamp(0.85rem, 4vw, 1rem);
    }

    .btn {
      font-size: 12px;
      padding: 8px 14px;
    }

    .search-wrap {
      padding: 12px 14px 0;
    }

    .search-wrap input {
      padding: 10px 14px;
      font-size: 14px;
    }

    .content {
      padding: 12px 14px 16px;
    }

    .article-card {
      padding: 12px 14px;
    }

    .article-card h3 {
      font-size: clamp(0.82rem, 3.5vw, 0.95rem);
    }

    .article-body {
      font-size: 13px;
    }

    .modal-box {
      padding: 16px 14px;
    }

    .modal-actions .btn {
      font-size: 13px;
      padding: 10px;
    }
  }

  @media (min-width: 481px) and (max-width: 768px) {
    .page-wrap {
      padding: 16px 16px 50px;
    }

    .header {
      padding: 14px 18px;
    }

    .content {
      padding: 14px 18px 20px;
    }

    .search-wrap {
      padding: 14px 18px 0;
    }
  }

  @media (min-width: 769px) {
    .page-wrap {
      padding: 32px 24px 80px;
    }

    .header {
      padding: 18px 28px;
    }

    .header-actions {
      gap: 12px;
    }

    .content {
      padding: 18px 28px 28px;
    }

    .search-wrap {
      padding: 18px 28px 0;
    }

    .articles-grid {
      gap: 14px;
    }

    .article-card {
      padding: 20px 24px;
    }

    .article-card-header {
      flex-direction: row;
      align-items: flex-start;
    }

    .article-card .admin-actions {
      flex: none;
    }

    .modal-actions {
      flex-direction: row;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .modal-box {
      padding: 32px 36px;
    }

    .article-body .flex-grid {
      flex-direction: row;
    }

    .article-body .flex-grid .item {
      flex: 1;
    }
  }

  /* ============================================================
     SAFE AREA
     ============================================================ */
  @supports (padding: max(0px)) {
    .page-wrap {
      padding-left: max(8px, env(safe-area-inset-left));
      padding-right: max(8px, env(safe-area-inset-right));
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(40px, env(safe-area-inset-bottom));
    }
  }

  @media (min-width: 769px) {
    @supports (padding: max(0px)) {
      .page-wrap {
        padding-left: max(24px, env(safe-area-inset-left));
        padding-right: max(24px, env(safe-area-inset-right));
        padding-top: max(32px, env(safe-area-inset-top));
        padding-bottom: max(80px, env(safe-area-inset-bottom));
      }
    }
  }

  /* ============================================================
     СКРОЛЛ
     ============================================================ */
  ::-webkit-scrollbar {
    width: 5px;
    height: 5px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--ink-muted);
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="card">

    <!-- ============================================================
         ШАПКА
         ============================================================ -->
    <div class="header">
      <div class="header-left">
        <span class="header-icon">📚</span>
        <h1>Материалы для УСМ</h1>
      </div>
      <div class="header-actions">
        <a href="index.html" class="btn btn-back">← Назад</a>
        <button class="btn btn-add hidden" id="addArticleBtn">➕ Добавить</button>
      </div>
    </div>

    <!-- ============================================================
         ПОИСК
         ============================================================ -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по статьям..." />
    </div>

    <!-- ============================================================
         КОНТЕНТ
         ============================================================ -->
    <div class="content">
      <div id="articlesContainer" class="articles-grid">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Загрузка статей...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ============================================================
     МОДАЛКА СОЗДАНИЯ / РЕДАКТИРОВАНИЯ
     ============================================================ -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h2 id="editModalTitle">➕ Новая статья</h2>
    <p class="sub">Используйте HTML-теги для форматирования</p>

    <form id="editArticleForm">
      <input type="hidden" id="editArticleId" value="">

      <div class="field">
        <label for="editArticleTitle">Название *</label>
        <input type="text" id="editArticleTitle" required placeholder="Введите название">
      </div>

      <div class="field">
        <label for="editArticleDescription">Краткое описание</label>
        <input type="text" id="editArticleDescription" placeholder="Кратко о чем статья...">
      </div>

      <div class="field">
        <label for="editArticleContent">Содержание *</label>
        <textarea id="editArticleContent" required placeholder="Полный текст с HTML-форматированием..."></textarea>
        <div class="hint">
          💡 Теги: <code>&lt;b&gt;</code> <code>&lt;i&gt;</code> <code>&lt;ul&gt;</code> <code>&lt;li&gt;</code> <code>&lt;table&gt;</code> <code>&lt;div class="..."&gt;</code>
        </div>
      </div>

      <div class="field">
        <label for="editArticleCategory">Категория</label>
        <select id="editArticleCategory">
          <option value="general">Общее</option>
          <option value="kpi">KPI</option>
          <option value="processes">Процессы</option>
          <option value="skills">Навыки</option>
          <option value="client">Работа с клиентами</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelEditBtn">Отмена</button>
        <button type="submit" class="btn btn-primary" id="saveArticleBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- ============================================================
     МОДАЛКА УДАЛЕНИЯ
     ============================================================ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <h2>🗑️ Удалить статью?</h2>
    <p class="sub">Это действие нельзя отменить.</p>
    <p id="deleteArticleTitle" style="font-weight:600; color: var(--orange-deep); word-break:break-word;"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="cancelDeleteBtn">Отмена</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
    </div>
  </div>
</div>

<!-- ============================================================
     СКРИПТ
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, addDoc,
  updateDoc, deleteDoc, doc, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ROLE = 'usm';
let currentUser = null;
let isAdmin = false;
let allArticles = [];
let editingId = null;
let deletingId = null;

const container = document.getElementById('articlesContainer');
const searchInput = document.getElementById('searchInput');
const addBtn = document.getElementById('addArticleBtn');

const editModal = document.getElementById('editModal');
const editTitle = document.getElementById('editModalTitle');
const editForm = document.getElementById('editArticleForm');
const editId = document.getElementById('editArticleId');
const editName = document.getElementById('editArticleTitle');
const editDesc = document.getElementById('editArticleDescription');
const editContent = document.getElementById('editArticleContent');
const editCat = document.getElementById('editArticleCategory');
const cancelEdit = document.getElementById('cancelEditBtn');
const saveBtn = document.getElementById('saveArticleBtn');

const deleteModal = document.getElementById('deleteModal');
const deleteTitle = document.getElementById('deleteArticleTitle');
const cancelDelete = document.getElementById('cancelDeleteBtn');
const confirmDelete = document.getElementById('confirmDeleteBtn');

async function loadArticles() {
  try {
    const q = query(collection(db, "articles"), where("role", "==", ROLE), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allArticles = [];
    snap.forEach(d => allArticles.push({ id: d.id, ...d.data() }));
    render(allArticles);
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Ошибка загрузки</p><p style="font-size:13px;color:var(--red);">${e.message}</p></div>`;
  }
}

function render(articles) {
  if (!articles || !articles.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Пока нет статей</p>
        ${isAdmin ? '<p style="font-size:13px;">Нажмите "Добавить" чтобы создать первую</p>' : ''}
      </div>`;
    return;
  }

  container.innerHTML = articles.map(a => `
    <div class="article-card" data-id="${a.id}">
      <div class="article-card-header">
        <div style="flex:1;">
          <h3>${a.title || 'Без названия'}</h3>
          ${a.description ? `<div class="desc">${a.description}</div>` : ''}
        </div>
        <div class="admin-actions">
          <button class="btn-icon-sm edit ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">✏️</button>
          <button class="btn-icon-sm delete ${isAdmin ? '' : 'hidden'}" data-id="${a.id}">🗑️</button>
        </div>
      </div>
      <div class="meta">
        <span>📅 ${formatDate(a.createdAt)}</span>
        ${a.category ? `<span>🏷️ ${a.category}</span>` : ''}
        ${a.authorEmail ? `<span>✍️ ${a.authorEmail}</span>` : ''}
      </div>
      <div class="article-body" id="body-${a.id}">${a.content || '<p>Содержание не добавлено</p>'}</div>
      <button class="btn-expand" data-id="${a.id}">📖 Читать полностью</button>
    </div>
  `).join('');

  document.querySelectorAll('.btn-expand').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = b.dataset.id;
      const body = document.getElementById(`body-${id}`);
      if (body) {
        body.classList.toggle('open');
        b.textContent = body.classList.contains('open') ? '📕 Свернуть' : '📖 Читать полностью';
      }
    });
  });

  document.querySelectorAll('.edit').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openEdit(a);
    });
  });

  document.querySelectorAll('.delete').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const a = allArticles.find(x => x.id === b.dataset.id);
      if (a) openDelete(a);
    });
  });
}

function formatDate(ts) {
  if (!ts) return 'Неизвестно';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch { return 'Неизвестно'; }
}

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { render(allArticles); return; }
  render(allArticles.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.description || '').toLowerCase().includes(q) ||
    (a.content || '').toLowerCase().includes(q)
  ));
});

function openEdit(a = null) {
  if (a) {
    editTitle.textContent = '✏️ Редактировать';
    editId.value = a.id;
    editName.value = a.title || '';
    editDesc.value = a.description || '';
    editContent.value = a.content || '';
    editCat.value = a.category || 'general';
    saveBtn.textContent = 'Обновить';
    editingId = a.id;
  } else {
    editTitle.textContent = '➕ Новая статья';
    editId.value = '';
    editName.value = '';
    editDesc.value = '';
    editContent.value = '';
    editCat.value = 'general';
    saveBtn.textContent = 'Добавить';
    editingId = null;
  }
  editModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function openDelete(a) {
  deletingId = a.id;
  deleteTitle.textContent = `"${a.title || 'Без названия'}"`;
  deleteModal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  editModal.classList.remove('active');
  document.body.style.overflow = '';
  editForm.reset();
}

function closeDelete() {
  deleteModal.classList.remove('active');
  document.body.style.overflow = '';
  deletingId = null;
}

cancelEdit.addEventListener('click', closeEdit);
cancelDelete.addEventListener('click', closeDelete);
editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });
deleteModal.addEventListener('click', e => { if (e.target === deleteModal) closeDelete(); });

editForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = editName.value.trim();
  const desc = editDesc.value.trim();
  const content = editContent.value.trim();
  const cat = editCat.value;
  if (!title || !content) { alert('Заполните название и содержание'); return; }
  try {
    if (editingId) {
      await updateDoc(doc(db, 'articles', editingId), { title, description: desc, content, category: cat, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'articles'), { title, description: desc, content, category: cat, role: ROLE, authorUid: currentUser?.uid, authorEmail: currentUser?.email, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEdit();
    await loadArticles();
  } catch (e) {
    alert('Ошибка сохранения');
    console.error(e);
  }
});

confirmDelete.addEventListener('click', async () => {
  if (!deletingId) return;
  try {
    await deleteDoc(doc(db, 'articles', deletingId));
    closeDelete();
    await loadArticles();
  } catch (e) {
    alert('Ошибка удаления');
    console.error(e);
  }
});

addBtn.addEventListener('click', () => openEdit(null));

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    isAdmin = user.email === ADMIN_EMAIL;
    if (isAdmin) addBtn.classList.remove('hidden');
    loadArticles();
  } else {
    window.location.href = 'index.html';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (editModal.classList.contains('active')) closeEdit();
    if (deleteModal.classList.contains('active')) closeDelete();
  }
});
</script>

</body>
</html>
