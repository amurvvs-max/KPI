<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KPI Guide — Кладовщик</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .coming-soon {
    max-width: 600px;
    margin: 80px auto;
    text-align: center;
    padding: 40px 24px;
  }
  .coming-soon .icon { font-size: 64px; }
  .coming-soon h1 { font-family: var(--font-display); font-size: 28px; }
  .coming-soon p { color: var(--ink-soft); font-size: 16px; }
  .btn-back-large {
    display: inline-block;
    padding: 12px 32px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: var(--ink);
    font-weight: 500;
    margin-top: 20px;
    transition: all 0.15s ease;
  }
  .btn-back-large:hover {
    background: var(--bg);
    border-color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="coming-soon">
  <div class="icon">📦</div>
  <h1>Страница кладовщика</h1>
  <p>Скоро здесь появятся материалы для кладовщиков</p>
  <a href="index.html" class="btn-back-large">← Вернуться</a>
</div>
</body>
</html>
